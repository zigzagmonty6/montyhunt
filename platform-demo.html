                <button className="btn btn-outline" disabled={busy} onClick={rtSubmit} style={{marginTop:20}}>Continue<span className="keyhint">Enter</span></button>
              </div>}
              {!retype&&<button className="btn btn-primary anim-fade" disabled={busy} onClick={nx} style={{marginTop:30}}>Next<span className="keyhint" style={{color:'white'}}>Enter</span></button>}
            </>}
          </div>
        </div></div>
      </div>
    );
  }

  function VocabTyped({pupil,set,items,isPreview,onDone,addC,addW,pct}){
    return <TypedBase pupil={pupil} set={set} items={items} isPreview={isPreview} onDone={onDone} addC={addC} addW={addW} pct={pct} isLatin={false}
      getPromptTop={q=>q.latin} getKey={q=>q.id||q.latin} getPromptSub={null} getCorrect={q=>q.english[0]}/>;
  }

  // ── Helper: render a principal part with coloured ending ─────────────────────
  // partIdx: 0=present, 1=infinitive, 2=perfect, 3=PPP
  const renderPartWithColor = (form, partIdx) => {
    if (!form) return form;
    if (partIdx === 0) { // present — colour the final -o blue
      return <>{form.slice(0,-1)}<span style={{color:'var(--blue)',fontWeight:700}}>{form.slice(-1)}</span></>;
    }
    if (partIdx === 1) { // infinitive — colour the final -re coral (consistent across all conjugations)
      return <>{form.slice(0,-2)}<span style={{color:'var(--coral)',fontWeight:700}}>re</span></>;
    }
    if (partIdx === 2) { // perfect — colour [marker]+i
      const pm = form.match(/^(.*?)([vsux])(i)$/);
      if (pm) return <>{pm[1]}<span style={{color:'#7C3AED',fontWeight:700}}>{pm[2]}</span><span style={{color:'var(--blue)',fontWeight:700}}>i</span></>;
      if (form.endsWith('i')) return <>{form.slice(0,-1)}<span style={{color:'var(--blue)',fontWeight:700}}>i</span></>;
      return form;
    }
    if (partIdx === 3) { // PPP — colour -tus/-sus gold
      const pm = form.match(/^(.*?)(tus|sus)$/);
      if (pm) return <>{pm[1]}<span style={{color:'var(--gold)',fontWeight:700}}>{pm[2]}</span></>;
      return form;
    }
    return form;
  };

  // ── Building Parts Pattern Screen ─────────────────────────────────────────────
  function BPPattern({set,onDone}){
    const ps=set.pattern_screen;
    useEffect(()=>{resetScroll();},[]);
    useEffect(()=>{const h=e=>{if(e.key==='Enter')onDone()};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[onDone]);
    if(!ps){onDone();return null;}

    // ── All-verbs grouped display ─────────────────────────────────────────────
    const mode=set.mode;
    const allVerbs=set.verbs||[];

    // Classify a verb into its pattern group
    const grpKey=v=>{
      if(mode==='perfects'){
        const pf=v.perfect;if(!pf)return'none';
        if(/[aeiou]vi$/.test(pf))return'v';
        if(/ui$/.test(pf))return'u';
        if(/xi$/.test(pf))return'x';
        if(/[^x]si$/.test(pf)||/ssi$/.test(pf))return's';
        return'str';
      }
      if(mode==='ppps'){
        // Simplified: all -tus variants (atus/itus/etus/consonant-tus) → 'tus'; -sus/-xus → 'sus'; no PPP → 'none'
        const p=v.ppp;if(!p)return'none';
        if(p.endsWith('sus')||p.endsWith('xus'))return'sus';
        if(p.endsWith('tus'))return'tus'; // atus, itus, etus, or consonant-stem tus — all the same marker
        return'tus'; // fallback: any other form still shows under tus group
      }
      return'all'; // infinitives: flat list
    };

    const GRP={
      v:    {label:'perfect marker: -v-',    color:'var(--blue)'},
      u:    {label:'perfect marker: -u-',    color:'var(--gold)'},
      x:    {label:'perfect marker: -x-',    color:'var(--coral)'},
      s:    {label:'perfect marker: -s-',    color:'var(--green-bright)'},
      str:  {label:'strong / vowel-change',  color:'var(--navy)'},
      none: {label:'no perfect / no PPP',    color:'var(--lgrey)'},
      tus:  {label:'PPP marker: -tus-',      color:'var(--blue)'},
      sus:  {label:'PPP marker: -sus-',      color:'var(--gold)'},
      other:{label:'other',                  color:'var(--grey)'},
      all:  {label:'',                       color:'var(--blue)'},
    };

    const ORDER={
      perfects:['v','u','x','s','str','none'],
      ppps:['tus','sus','none'],
    };
    const grpMap={};
    allVerbs.forEach(v=>{const k=grpKey(v);if(!grpMap[k])grpMap[k]=[];grpMap[k].push(v);});
    const grpOrder=(ORDER[mode])||['all'];
    const groups=grpOrder.filter(k=>grpMap[k]).map(k=>({key:k,meta:GRP[k]||GRP.other,verbs:grpMap[k]}));

    // Render the colored part for a verb in the compact list
    const renderCompact=v=>{
      if(mode==='infinitives'){
        const stem=v.infinitive.slice(0,-2);
        return <span style={{fontFamily:'Crimson Text,serif',fontStyle:'italic',fontWeight:700}}>{stem}<span style={{color:'var(--coral)'}}>re</span></span>;
      }
      if(mode==='perfects'){
        const pf=v.perfect;
        if(!pf)return<span style={{color:'var(--grey)',fontFamily:'sans-serif',fontStyle:'normal',fontSize:'0.85rem'}}>—</span>;
        const st={fontFamily:'Crimson Text,serif',fontStyle:'italic',fontWeight:700};
        // -u- perfect: ends in 'ui' — stem + u(marker) + i(person)
        if(pf.endsWith('ui'))return<span style={st}>{pf.slice(0,-2)}<span style={{color:'var(--coral)'}}>u</span><span style={{color:'var(--blue)'}}>i</span></span>;
        // -v-, -x-, -s-: find marker after a vowel
        const m=pf.match(/^(.*[aeiou])([vsux])(.+)$/);
        if(m)return<span style={st}>{m[1]}<span style={{color:'var(--coral)'}}>{m[2]}</span><span style={{color:'var(--blue)'}}>{m[3]}</span></span>;
        return<span style={st}>{pf}</span>;
      }
      if(mode==='ppps'){
        const ppp=v.ppp;
        if(!ppp)return<span style={{color:'var(--grey)',fontFamily:'sans-serif',fontStyle:'normal',fontSize:'0.85rem'}}>no PPP</span>;
        const m=ppp.match(/^(.+?)(atus|itus|etus|sus|xus|tus)$/);
        if(m)return<span style={{fontFamily:'Crimson Text,serif',fontStyle:'italic',fontWeight:700}}>{m[1]}<span style={{color:'var(--gold)'}}>{m[2]}</span></span>;
        return<span style={{fontFamily:'Crimson Text,serif',fontStyle:'italic',fontWeight:700}}>{ppp}</span>;
      }
      return null;
    };

    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><ProgressBar pct={5}/></div>
        <div className="activity-body">
          <div className="pattern-box" style={{maxWidth:1000}}>
            <h3 style={{fontSize:'1.6rem',marginBottom:12}} dangerouslySetInnerHTML={{__html:renderOrdinals(ps.title||ps.heading)}}></h3>
            <p className="pattern-rule" style={{marginBottom:28}}>{renderText(ps.subtitle||ps.rule)}</p>
            <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
              {ps.examples.map((e,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<ps.examples.length-1?'1px solid var(--lgrey)':'none',flexWrap:'wrap'}}>
                  {(e.present||e.stem)?<><span className="latin" style={{fontSize:'1.3rem',color:'var(--dark)',whiteSpace:'nowrap'}}>{(()=>{const pr=e.present||e.stem+'o';return <>{pr.slice(0,-1)}<span style={{color:'var(--blue)'}}>{pr.slice(-1)}</span></>;})()}</span><span style={{color:'var(--lgrey)',fontSize:'1.2rem'}}>→</span></>:null}
                  {(e.infinitive||e.inf)&&<><span className="latin" style={{fontSize:'1.3rem',color:'var(--dark)',whiteSpace:'nowrap'}}>{(e.infinitive||e.inf).slice(0,-2)}<span style={{color:'var(--coral)'}}>re</span></span><span style={{color:'var(--lgrey)',fontSize:'1.2rem'}}>→</span></>}
                  {e.perfect&&<><span className="latin" style={{fontSize:'1.3rem',color:'var(--dark)',fontWeight:700,whiteSpace:'nowrap'}}>{(()=>{
                    // Highlight the perfect-tense marker: -v- for 1st conj,
                    // -s- for 3rd, -u- for 2nd. We find the last v/s/u before
                    // the final -i and colour-highlight it in purple.
                    const pf=e.perfect;
                    const m=pf.match(/^(.*?)([vsux])(i|isti|it|imus|istis|erunt)$/);
                    if(!m) return pf;
                    return <>{m[1]}<span style={{color:'var(--coral)'}}>{m[2]}</span><span style={{color:'var(--blue)'}}>{m[3]}</span></>;
                  })()}</span><span style={{color:'var(--lgrey)',fontSize:'1.2rem'}}>→</span></>}
                  <span className="latin" style={{fontSize:'1.3rem',fontWeight:700,whiteSpace:'nowrap'}}>
                    {(()=>{
                      const stem=e.full.slice(0,e.full.length-e.ending.length);
                      const decl=e.declension&&<span style={{color:'var(--grey)',fontWeight:400,fontSize:'1rem'}}> {e.declension}</span>;
                      if(e.ending==='tus'||e.ending==='sus') return <>{stem}<span style={{color:'var(--gold)',fontWeight:700}}>{e.ending}</span>{decl}</>;
                      if(e.ending==='re'||e.ending==='ere') return <>{stem}<span style={{color:'var(--coral)',fontWeight:700}}>{e.ending}</span>{decl}</>;
                      // Perfect endings: split marker + person-ending -i
                      const pm=e.ending.match(/^([^i])(i)$/);
                      if(pm) return <>{stem}<span style={{color:'var(--coral)',fontWeight:700}}>{pm[1]}</span><span style={{color:'var(--blue)',fontWeight:700}}>i</span>{decl}</>;
                      if(e.ending==='i') return <>{stem}<span style={{color:'var(--blue)',fontWeight:700}}>i</span>{decl}</>;
                      // Fallback (multi-char endings like vi handled above; anything else coral)
                      return <>{stem}<span style={{color:'var(--coral)',fontWeight:700}}>{e.ending}</span>{decl}</>;
                    })()}
                  </span>
                  <span style={{color:'var(--grey)',fontSize:'0.95rem',fontStyle:'italic',marginLeft:4}}>- {e.english}</span>
                </div>
              ))}
            </div>
            {(ps.footnote||ps.note)&&<p className="pattern-note">{renderTextWithKey(ps.footnote||ps.note)}</p>}

            {/* ── All verbs in set, grouped by SVG-brace pattern ── */}
            {allVerbs.length>0&&(mode==='perfects'||mode==='ppps')&&<div style={{marginTop:32,width:'100%'}}>
              <p style={{fontWeight:900,fontSize:'0.88rem',color:'var(--navy)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:18,borderBottom:'2px solid var(--lgrey)',paddingBottom:8}}>
                All {allVerbs.length} verbs in this set
              </p>
              <div style={{display:'flex',flexWrap:'wrap',gap:32,alignItems:'flex-start'}}>
                {groups.map(g=>(
                  <div key={g.key} style={{display:'inline-grid',gridTemplateColumns:'auto 22px auto',alignItems:'stretch',gap:'0 16px'}}>
                    {/* Verbs column */}
                    <div style={{display:'flex',flexDirection:'column',justifyContent:'space-between',padding:'8px 0',textAlign:'right',gap:6}}>
                      {g.verbs.map((v,vi)=>(
                        <span key={vi} style={{display:'inline-flex',alignItems:'baseline',justifyContent:'flex-end',gap:8,fontFamily:'Crimson Text,serif',fontStyle:'italic',fontWeight:700,color:'var(--dark)',fontSize:'1.2rem',lineHeight:1.35}}>
                          {v.present}
                          <span style={{fontFamily:'var(--font-sans)',fontStyle:'normal',fontWeight:600,color:'var(--grey)',fontSize:'0.82rem'}}>{mode==='perfects'?v.perfect:mode==='ppps'?v.ppp:v.infinitive}</span>
                        </span>
                      ))}
                    </div>
                    {/* SVG curly brace */}
                    <svg viewBox="0 0 22 100" preserveAspectRatio="none" aria-hidden="true"
                      style={{height:'auto',width:22,color:'var(--dark)',alignSelf:'stretch'}}>
                      <path d="M 4 2 C 14 2, 14 2, 14 12 L 14 44 C 14 50, 16 50, 21 50 C 16 50, 14 50, 14 56 L 14 88 C 14 98, 14 98, 4 98"
                        fill="none" stroke="currentColor" strokeWidth="2.4"
                        strokeLinecap="round" strokeLinejoin="round"
                        vectorEffect="non-scaling-stroke"/>
                    </svg>
                    {/* Marker label */}
                    <div style={{alignSelf:'center'}}>
                      {g.key!=='all'&&<>
                        <p style={{font:'800 .75rem/1 var(--font-sans)',color:'var(--grey)',textTransform:'uppercase',letterSpacing:'.08em',margin:'0 0 4px'}}>marker</p>
                        <p style={{fontFamily:'Crimson Text,serif',fontStyle:'italic',fontWeight:700,color:g.meta.color,fontSize:'2rem',lineHeight:1,margin:0}}>
                          {(g.key==='str'||g.key==='other'||g.key==='none')
                            ?<span style={{fontFamily:'var(--font-sans)',fontStyle:'normal',fontSize:'0.95rem',fontWeight:800,color:g.meta.color,lineHeight:1.3,display:'block',maxWidth:130}}>{g.meta.label}</span>
                            :<><span style={{opacity:.55}}>-</span>{g.key}<span style={{opacity:.55}}>-</span></>}
                        </p>
                      </>}
                    </div>
                  </div>
                ))}
              </div>
            </div>}
          </div>
          <button className="btn btn-primary" autoFocus onClick={onDone} style={{marginTop:28}}>I'm ready<span className="keyhint" style={{color:'white'}}>Enter</span></button>
        </div></div>
      </div>
    );
  }

  // ── Building Parts FC (flashcard phase) ───────────────────────────────────────
  // For mode=infinitives: shows present / [blank] using the gap-fill visual
  // For mode=perfects: shows present / infinitive / [blank]
  // For mode=ppps: shows present / infinitive / perfect / [blank]
  // FC here just shows the answer - no rating, just flip and move on
  function BPFC({pupil,set,verbs,isPreview,onDone,pct}){
    const [queue,setQueue]=useState(()=>[...verbs]);
    const [qIdx,setQIdx]=useState(0);
    const [rev,setRev]=useState(false);const [busy,setBusy]=useState(false);
    const [exitCls,setExitCls]=useState('');const [entering,setEntering]=useState(false);
    const [doneCount,setDoneCount]=useState(0);
    const v=queue[qIdx];
    if(!v){onDone();return null;}
    const mode=set.mode;
    const isAllFour = mode==='all_four';
    const known=set.show_parts_so_far||1;
    const labels=['present','infinitive','perfect','PPP'];
    const shownParts=[];
    if(isAllFour){
      shownParts.push(v.present); // front shows only present
    } else {
      for(let i=0;i<known;i++){
        const vals=[v.present,v.infinitive,v.perfect,v.ppp];
        if(vals[i]!==null&&vals[i]!==undefined) shownParts.push(vals[i]);
      }
    }
    const back=mode==='infinitives'?v.infinitive:mode==='perfects'?v.perfect:v.ppp;
    const backEng=mode==='infinitives'?v.eng_infinitive:mode==='perfects'?v.eng_perfect:v.eng_ppp;
    const noPPP = mode==='ppps' && v.ppp===null;
    // all_four reveal parts: the 3 parts beyond the present
    const allFourReveal = isAllFour ? [
      {part:v.infinitive, eng:v.eng_infinitive, idx:1},
      {part:v.perfect,    eng:v.eng_perfect,    idx:2},
      {part:v.ppp,        eng:v.eng_ppp,         idx:3},
    ] : [];

    const rate=async(r)=>{
      if(busy)return;setBusy(true);
      if(!isPreview) await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'flashcard_rating',question_text:v.present,pupil_answer:r});
      setExitCls(r==='got_it'?'fc-exit-right':'fc-exit-left');
      const newQLen=queue.length+(r==='again'?1:0);
      if(r==='again') setQueue(q=>{const next=[...q];next.push({...v,revisit:true});return next;});
      else setDoneCount(d=>d+1);
      setTimeout(()=>{
        setExitCls('');setRev(false);setBusy(false);
        if(qIdx+1>=newQLen)onDone();
        else{setQIdx(i=>i+1);setEntering(true);setTimeout(()=>setEntering(false),230);}
      },270);
    };
    useEffect(()=>{
      const h=e=>{
        if(e.code==='Space'){e.preventDefault();if(!rev)setRev(true);else rate('got_it');return;}
        if(rev&&e.key==='1') rate('again');
        if(rev&&e.key==='2') rate('got_it');
      };
      window.addEventListener('keydown',h);
      return()=>window.removeEventListener('keydown',h);
    });
    const bpFreshInQueue=queue.slice(qIdx).filter(c=>!c.revisit).length;
    const bpHardInQueue=queue.slice(qIdx+1).filter(c=>c.revisit).length;
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><ProgressBar pct={pct}/></div>
        <div className="activity-body">
          {/* Question text is OUTSIDE the animation wrapper so it doesn't swipe with the cards */}
          <p style={{color:'var(--grey)',marginBottom:16,fontWeight:700,fontSize:'1.2rem',textAlign:'center',width:'100%'}}>
            {isAllFour
              ? <>What are all the <strong style={{color:'var(--navy)'}}>principal parts</strong> of this verb?</>
              : <>What is the <strong style={{color:'var(--navy)'}}>{labels[known]}</strong> of this verb?</>
            }
          </p>
          <div style={{display:'flex',alignItems:'flex-start',gap:20,width:'100%',maxWidth:1000,justifyContent:'center'}}>
            <CardPile count={bpFreshInQueue} hardCount={bpHardInQueue} side="left"/>
            <div className={`${exitCls}${entering?' fc-enter':''}`} style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',alignItems:'center'}}>
              <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20,flexWrap:'wrap',justifyContent:'center'}}>
                {/* Present (always shown) */}
                <div style={{textAlign:'center'}}>
                  <span className="part-chip"><span style={{whiteSpace:'nowrap'}}>{renderPartWithColor(shownParts[0],0)}</span></span>
                  <p style={{color:'var(--grey)',fontSize:'0.85rem',marginTop:4,fontStyle:'italic'}}>{v.eng_present}</p>
                </div>
                {isAllFour
                  ? /* all_four mode: show 3 blanks on front, reveal all 3 on flip */
                    allFourReveal.map((r,ri)=>(
                      <React.Fragment key={ri}>
                        <span className="part-sep">/</span>
                        <div style={{textAlign:'center'}}>
                          {r.part===null
                            ? <><span className="part-chip" style={{borderColor:'var(--grey)',color:'var(--grey)',fontStyle:'normal',fontSize:'1rem'}}>{rev?'no PPP':'?'}</span>
                               {rev&&<p className="anim-fade" style={{color:'var(--grey)',fontSize:'0.85rem',marginTop:4,fontStyle:'italic'}}>This verb has no PPP</p>}</>
                            : <><span className="part-chip" style={{borderColor:'var(--blue)',color:rev?'#1a73e8':'var(--blue)'}}>
                                {rev?<span style={{whiteSpace:'nowrap'}}>{renderPartWithColor(r.part,r.idx)}</span>:'?'}
                              </span>
                              {rev&&<p className="anim-fade" style={{color:'var(--grey)',fontSize:'0.85rem',marginTop:4,fontStyle:'italic'}}>{r.eng}</p>}
                              </>
                          }
                        </div>
                      </React.Fragment>
                    ))
                  : /* single-part modes: show already-known parts then one blank */
                    <>
                      {shownParts.slice(1).map((p,i)=>(
                        <React.Fragment key={i}>
                          <span className="part-sep">/</span>
                          <div style={{textAlign:'center'}}>
                            <span className="part-chip"><span style={{whiteSpace:'nowrap'}}>{renderPartWithColor(p,i+1)}</span></span>
                            <p style={{color:'var(--grey)',fontSize:'0.85rem',marginTop:4,fontStyle:'italic'}}>
                              {i===0?v.eng_infinitive:i===1?v.eng_perfect:v.eng_ppp}
                            </p>
                          </div>
                        </React.Fragment>
                      ))}
                      <span className="part-sep">/</span>
                      <div style={{textAlign:'center'}}>
                        {noPPP
                          ?<>
                            <span className="part-chip" style={{borderColor:'var(--grey)',color:'var(--grey)',fontStyle:'normal',fontSize:'1rem'}}>
                              {rev ? 'no PPP' : '?'}
                            </span>
                            {rev&&<p className="anim-fade" style={{color:'var(--grey)',fontSize:'0.85rem',marginTop:4,fontStyle:'italic'}}>This verb has no PPP</p>}
                          </>
                          :<>
                            <span className="part-chip" style={{borderColor:'var(--blue)',color:rev?'#1a73e8':'var(--blue)'}}>
                              {rev?<span style={{whiteSpace:'nowrap'}}>{renderPartWithColor(back,known)}</span>:'?'}
                            </span>
                            {rev&&<p className="anim-fade" style={{color:'var(--grey)',fontSize:'0.85rem',marginTop:4,fontStyle:'italic'}}>{backEng}</p>}
                          </>
                        }
                      </div>
                    </>
                }
              </div>
            </div>
            <CardPile count={doneCount} side="right"/>
          </div>
          {rev
            ?<div className="anim-fade" style={{display:'flex',gap:32,marginTop:24}}>
               <button className="btn btn-grey" disabled={busy} onClick={()=>rate('again')}>Hard<span className="keyhint">Press 1</span></button>
               <button className="btn btn-primary" disabled={busy} onClick={()=>rate('got_it')}>Easy<span className="keyhint" style={{color:'white'}}>Press 2</span></button>
             </div>
            :<p style={{marginTop:24,color:'var(--grey)',fontSize:'1.3rem',fontWeight:700}}>Press SPACE to reveal</p>
          }
          <div style={{marginTop:16,display:'flex',gap:12,alignItems:'center'}}>
            <span style={{fontSize:'0.85rem',fontWeight:700,color:'var(--lgrey)'}}>Card {qIdx+1} of {queue.length}</span>
            <div style={{width:160,height:5,background:'var(--lgrey)',borderRadius:3,overflow:'hidden'}}>
              <div style={{width:`${((qIdx+1)/Math.max(queue.length,1))*100}%`,height:'100%',background:'var(--blue)',borderRadius:3,transition:'width .3s'}}></div>
            </div>
          </div>
        </div></div>
      </div>
    );
  }


  // ── Building Parts MC (MCQ phase between FC and Typed) ───────────────────────
  // Shows known parts + blank chip, then 4 Latin MC options (correct + 3 distractors).
  // No timer; marks correct/wrong like VocabMC.
  function BPMC({pupil,set,verbs,isPreview,onDone,addC,addW,pct}){
    const [queue,setQueue]=useState(()=>[...verbs]);
    const [qIdx,setQIdx]=useState(0);
    const [sel,setSel]=useState(null);const [fb,setFb]=useState(null);const [busy,setBusy]=useState(false);
    const v=queue[qIdx];
    if(!v){onDone();return null;}
    const mode=set.mode;const known=set.show_parts_so_far||1;
    const isAllFour=mode==='all_four';
    const labels=['present','infinitive','perfect','PPP'];
    // For all_four: randomly assign one gap position per verb (stable per qIdx)
    const gapPos=set.gap_positions||[1,2,3];
    const assignedPosRef=useRef({});
    if(!(qIdx in assignedPosRef.current)){
      // pick a random available gap position for this verb
      const vals=[v.present,v.infinitive,v.perfect,v.ppp];
      const available=gapPos.filter(g=>vals[g]!=null);
      assignedPosRef.current[qIdx]=available[Math.floor(Math.random()*available.length)]||gapPos[0];
    }
    const allFourPos=assignedPosRef.current[qIdx]||2; // which part to quiz
    const shownParts=[];
    if(isAllFour){
      // Show present and all parts up to (but not including) the quizzed one
      for(let i=0;i<allFourPos;i++){const vals=[v.present,v.infinitive,v.perfect,v.ppp];if(vals[i]!=null)shownParts.push(vals[i]);}
    } else {
      for(let i=0;i<known;i++){const vals=[v.present,v.infinitive,v.perfect,v.ppp];if(vals[i]!=null)shownParts.push(vals[i]);}
    }
    const getPartByPos=(u,pos)=>[u.present,u.infinitive,u.perfect,u.ppp][pos];
    const back=isAllFour?getPartByPos(v,allFourPos):(mode==='infinitives'?v.infinitive:mode==='perfects'?v.perfect:v.ppp);
    const backLabel=isAllFour?labels[allFourPos]:labels[known];
    const noPPP=!isAllFour&&mode==='ppps'&&v.ppp===null;
    // Generate options once per question
    const optsRef=useRef(null);
    if(optsRef.current===null||optsRef.current.qIdx!==qIdx){
      const correct=back;
      const pos=isAllFour?allFourPos:known;
      const others=shuffleOnce(verbs.filter(u=>u!==v&&getPartByPos(u,pos)!==correct));
      const ds=[];
      for(const u of others){const d=getPartByPos(u,pos);if(d&&d!==correct&&!ds.includes(d)&&ds.length<3)ds.push(d);}
      optsRef.current={qIdx,opts:shuffleOnce([correct,...ds]),pos};
    }
    const opts=optsRef.current.opts;
    const quizPos=optsRef.current.pos||known;
    const pick=async o=>{
      if(fb||busy||noPPP)return;setBusy(true);setSel(o);
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'mc',question_text:`${backLabel} of ${v.present}`,pupil_answer:o,correct_answer:back});
      setFb(res);
      if(res.counts_as_correct){if(!v.failed)addC();}
      else{if(!v.failed)addW({latin:v.present,correct:back});setQueue(prev=>[...prev,{...v,failed:true}]);}
      setBusy(false);
    };
    const nx=()=>{resetScroll();optsRef.current=null;setSel(null);setFb(null);if(qIdx+1>=queue.length)onDone();else setQIdx(i=>i+1);};
    useEffect(()=>{
      // auto-advance for no-PPP verbs
      if(noPPP&&!fb){const t=setTimeout(()=>{if(!v.failed)addC();nx();},1200);return()=>clearTimeout(t);}
    },[qIdx,noPPP]);
    useEffect(()=>{
      const h=e=>{
        if(e.ctrlKey&&e.altKey&&e.code==="KeyK"){e.preventDefault();e.stopPropagation();if(!v?.failed)addC();nx();return;}
        if(e.ctrlKey&&e.altKey&&e.code==="KeyJ"){e.preventDefault();e.stopPropagation();nx();return;}
        if(fb&&(e.key==='Enter'||(e.code==='Space'&&e.target.tagName!=='INPUT'))){e.preventDefault();nx();}
        if(!fb){const n=parseInt(e.key);if(n>=1&&n<=4&&opts[n-1])pick(opts[n-1]);}
      };
      window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
    });
    const isRetry=v.failed;
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><ProgressBar pct={pct}/></div>
        <div className="activity-body" style={{overflowY:'hidden',justifyContent:'center'}}>
          <div style={{minHeight:40,display:'flex',justifyContent:'center',alignItems:'center',marginBottom:8}}>
            {isRetry&&<div className="anim-fade" style={{background:'#f97316',border:'2px solid #ea580c',borderRadius:10,padding:'6px 16px',fontWeight:800,color:'white',fontSize:'0.9rem',display:'inline-block'}}>Try this again — you got it wrong before.</div>}
          </div>
          <p style={{color:'var(--grey)',marginBottom:16,fontWeight:700,fontSize:'1.2rem',textAlign:'center',width:'100%'}}>
            What is the <strong style={{color:'var(--navy)'}}>{backLabel}</strong> of this verb?
          </p>
          {/* Parts row: known chips + blank chip */}
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:28,flexWrap:'wrap',justifyContent:'center'}}>
            {shownParts.map((p,i)=>(
              <React.Fragment key={i}>
                {i>0&&<span className="part-sep">/</span>}
                <div style={{textAlign:'center'}}>
                  <span className="part-chip"><span style={{whiteSpace:'nowrap'}}>{renderPartWithColor(p,i)}</span></span>
                  <p style={{color:'var(--grey)',fontSize:'0.85rem',marginTop:4,fontStyle:'italic'}}>
                    {i===0?v.eng_present:i===1?v.eng_infinitive:i===2?v.eng_perfect:v.eng_ppp}
                  </p>
                </div>
              </React.Fragment>
            ))}
            <span className="part-sep">/</span>
            <div style={{textAlign:'center'}}>
              {noPPP
                ?<span className="part-chip" style={{borderColor:'var(--grey)',color:'var(--grey)',fontStyle:'normal',fontSize:'1rem'}}>no PPP</span>
                :<span className="part-chip" style={{
                    borderColor:fb?(fb.counts_as_correct?'#16a34a':'var(--red-bright)'):'var(--blue)',
                    color:fb?(fb.counts_as_correct?'#16a34a':'var(--red-bright)'):'var(--blue)'}}>
                  {fb?<span style={{whiteSpace:'nowrap'}}>{renderPartWithColor(back,quizPos)}</span>:'?'}
                </span>
              }
            </div>
          </div>
          {/* MC options */}
          {!noPPP&&<div className="mc-options">
            {opts.map((o,i)=>(
              <button key={i} className={`mc-opt ${fb?(o===back?'correct':o===sel?'wrong':''):''}`}
                disabled={busy&&!fb} onClick={()=>pick(o)}>
                <span className="keyhint" style={{display:'block',marginBottom:12}}>Press {i+1}</span>
                <span style={{fontFamily:'Crimson Text,serif',fontStyle:'italic',fontWeight:700,fontSize:'1.4rem'}}>
                  {renderPartWithColor(o,quizPos)}

          </div>}
          {fb&&<div className="anim-fade" style={{minHeight:80,display:'flex',flexDirection:'column',alignItems:'center'}}>
            <button className="btn btn-primary" disabled={busy} onClick={nx} style={{marginTop:16}}>
              Next<span className="keyhint" style={{color:'white'}}>Enter / Space</span>
            </button>

          {!fb&&!noPPP&&<div style={{minHeight:80}}></div>}
        </div></div>
      </div>
    );
  }

  // ── Building Parts Typed (gap-fill visual for all modes) ─────────────────────
  function BPTyped({pupil,set,verbs,isPreview,onDone,addC,addW,pct}){
    const mode=set.mode;
    const labels=['present','infinitive','perfect','PPP'];
    const known=set.show_parts_so_far||1;
    const gapPositions=set.gap_positions||[known];

    // all_four_from_present = one question per verb: show present, type all remaining parts
    const isAllFourFromPresent = mode==='all_four_from_present';
    // all_four = one question per gap position per verb (fill in one missing at a time)
    const isAllFour = mode==='all_four';
    // all_four_progressive = phase1: gap at pos 2 (all verbs), phase2: gap at pos 3 (ppp verbs only), phase3: all_four_from_present
    const isProgressive = mode==='all_four_progressive';

    const [qs]=useState(()=>{
      const getP = v => [v.present, v.infinitive, v.perfect, v.ppp];
      if(isAllFourFromPresent){
        // Single question per verb
        return shuffleOnce(verbs.map(v=>({v,g:-1})));  // g=-1 = "all remaining"
      }
      if(isAllFour){
        // One question per gap position per verb, but only gaps 2 and 3 (perf/PPP)
        return shuffleOnce(verbs.flatMap(v=>gapPositions.filter(g=>getP(v)[g]!=null).map(g=>({v,g}))));
      }
      if(isProgressive){
        // Phase 1: gap at position 2 (perfect) for all verbs - show present+infinitive, type perfect
        const phase1 = shuffleOnce(verbs.map(v=>({v,g:2,phase:1})));
        // Phase 2: gap at position 3 (PPP) for verbs that have a PPP - show present+infinitive+perfect, type PPP
        const phase2 = shuffleOnce(verbs.filter(v=>v.ppp!==null).map(v=>({v,g:3,phase:2})));
        // Phase 3: all_four_from_present for all verbs
        const phase3 = shuffleOnce(verbs.map(v=>({v,g:-1,phase:3})));
        return [...phase1, ...phase2, ...phase3];
      }
      return shuffleOnce(verbs.filter(v=>mode!=='ppps'||v.ppp!==null).map(v=>({v,g:known})));
    });

    const [idx,setIdx]=useState(0);const [ans,setAns]=useState('');const [fb,setFb]=useState(null);
    const [showReveal,setShowReveal]=useState(false);
    const [retype,setRetype]=useState(false);const [rtAns,setRtAns]=useState('');const [rtFb,setRtFb]=useState(null);
    const [busy,setBusy]=useState(false);const inRef=useRef();const rtRef=useRef();

    if(!qs||qs.length===0){onDone();return null;}
    const {v,g}=qs[idx]||qs[0];
    const parts=[v.present,v.infinitive,v.perfect,v.ppp];

    // correct answer string
    let correct;
    if(g===-1){
      // all_four_from_present or progressive phase 3
      correct = v.ppp ? `${v.infinitive} ${v.perfect} ${v.ppp}` : `${v.infinitive} ${v.perfect}`;
    } else {
      correct = parts[g];
    }

    // For all_four (individual gap) show only up to and including the gap position
    // For all_four_from_present show all 4 (the input handles "remaining" parts)
    const shownCount = isAllFourFromPresent ? 4 : isAllFour ? (g+1) : 4;

    useEffect(()=>{if(!fb)inRef.current?.focus();if(retype)rtRef.current?.focus()},[idx,fb,retype]);

    const submit=async()=>{
      if(busy)return;setBusy(true);
      let res;
      if(isAllFourMode){
        res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'all_four_typed',question_text:v.present,pupil_answer:ans,correct_answer:correct});
      } else {
        res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'latin_typed',question_text:`${labels[g]} of ${v.present}`,pupil_answer:ans,correct_answer:correct});
      }
      setFb(res);
      if(res.counts_as_correct){if(!qs[idx].failed)addC()}
      else{
        if(!qs[idx].failed)addW({latin:v.present,correct:res.correct_answer});
        if(!qs.find(q=>q.v===v && q.failed)){
            qs.push({v, g, failed:true});
        }
        setShowReveal(true);setRetype(true)
      }
      setBusy(false);
    };
    const rtSubmit=async()=>{
      if(busy)return;
      if(!rtAns.trim()){setRtFb('Type your answer first.');return;}
      setBusy(true);
      const qt2=isAllFourMode?'all_four_typed':'latin_typed';
      const qt2text=isAllFourMode?v.present:`${labels[g]} of ${v.present}`;
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:qt2,question_text:qt2text,pupil_answer:rtAns,correct_answer:correct});
      if(res.counts_as_correct){ nx(); }else setRtFb('Not quite. Check the spelling.');
      setBusy(false);
    };
    const nx=()=>{resetScroll();setAns('');setFb(null);setShowReveal(false);setRetype(false);setRtAns('');setRtFb(null);if(idx+1>=qs.length)onDone();else setIdx(i=>i+1)};
    useEffect(()=>{const h=e=>{if(e.key==='Enter'){if(retype)rtSubmit();else if(fb&&!retype)nx();else if(!fb)submit()}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)});

    const inputStyle={fontFamily:'Crimson Text, serif',fontStyle:'italic',fontSize:'2.2rem',fontWeight:700};
    // all_four_typed (multi-part answer) only for all_four_from_present and progressive phase 3
    // isAllFour mode fills ONE gap at a time using latin_typed, not all_four_typed
    const isAllFourMode = isAllFourFromPresent || (isProgressive && g===-1);
    const isProgressiveSingleGap = isProgressive && g>=0;

    // For progressive phase display: determine show_parts_so_far based on gap position
    const progressiveShownCount = isProgressiveSingleGap ? (g===2 ? 3 : 4) : 4;
    const effectiveShownCount = isAllFour ? 4 : (isProgressiveSingleGap ? progressiveShownCount : shownCount);

    // Phase label for progressive mode
    const currentPhase = qs[idx]?.phase;
    const phaseLabel = isProgressive ? (currentPhase===1 ? 'Phase 1: Type the perfect' : currentPhase===2 ? 'Phase 2: Type the PPP' : 'Phase 3: All principal parts') : null;

    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><ProgressBar pct={pct}/></div>
        <div className="activity-body">
          <div style={{minHeight:40,display:'flex',justifyContent:'center',alignItems:'center',marginBottom:8}}>
            {qs[idx]?.failed&&<div className="anim-fade" style={{background:'#f97316',border:'2px solid #ea580c',borderRadius:10,padding:'6px 16px',fontWeight:800,color:'white',fontSize:'0.9rem',display:'inline-block'}}>Try this again — you got it wrong before.</div>}
          </div>
          <p style={{color:'var(--grey)',marginBottom:8,fontWeight:700,fontSize:'1.3rem'}}>
            {isAllFourMode
              ? <>Type the <strong style={{color:'var(--navy)',fontSize:'1.4rem'}}>remaining principal parts</strong>, in order, separated by spaces:</>
              : <>Type the <strong style={{color:'var(--navy)',fontSize:'1.4rem'}}>{labels[g]}</strong>:</>}
          </p>
          {isAllFourMode
            ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16,width:'100%',maxWidth:900}}>
              <div className="parts-row">
                <span className="part-chip"><span>{renderPartWithColor(v.present,0)}</span><span className="chip-eng">{v.eng_present}</span></span>
                <span className="part-sep">/</span>
                <span style={{color:'var(--blue)',fontFamily:'Crimson Text,serif',fontStyle:'italic',fontSize:'1.5rem',fontWeight:700}}>
                  {v.ppp ? 'infinitive / perfect / PPP' : 'infinitive / perfect'}
                </span>
              </div>
              <input ref={inRef} className={`gap-input ${fb?(fb.counts_as_correct?'ok':'bad'):''}`} value={ans} onChange={e=>setAns(e.target.value)} disabled={!!fb}
                placeholder="..."
                style={{...inputStyle,minWidth:380,textAlign:'left',paddingLeft:24}}/>
              {!v.ppp&&!fb&&<p style={{fontSize:'0.9rem',color:'var(--grey)',fontStyle:'italic',marginTop:4}}>Note: this verb has no PPP. Type only infinitive and perfect.</p>}
            </div>
            :<div className="parts-row">
              {Array.from({length:effectiveShownCount},(_,i)=>{
                const engLabels=[v.eng_present,v.eng_infinitive,v.eng_perfect,v.eng_ppp];
                if(i===g) return <React.Fragment key={i}>{i>0&&<span className="part-sep">/</span>}<input ref={inRef} className={`gap-input ${fb?(fb.counts_as_correct?'ok':'bad'):''}`} value={ans} onChange={e=>setAns(e.target.value)} disabled={!!fb} placeholder="..." style={inputStyle}/></React.Fragment>;
                if(parts[i]===null||parts[i]===undefined) return null;
                return <React.Fragment key={i}>{i>0&&<span className="part-sep">/</span>}<span className="part-chip"><span>{renderPartWithColor(parts[i],i)}</span><span className="chip-eng">{engLabels[i]}</span></span></React.Fragment>;
              })}
            </div>}
          {showReveal&&<div className="full-reveal anim-fade">
            {(g===-1?parts:parts.slice(0,g+1)).filter(p=>p!=null).map((p,i)=><React.Fragment key={i}>{i>0&&<span className="sep">/</span>}<span className="rv">{p}</span></React.Fragment>)}
          </div>}
          <div style={{minHeight:320,display:'flex',flexDirection:'column',alignItems:'center',width:'100%'}}>
            {!fb?<button className="btn btn-primary" disabled={busy} onClick={submit} style={{marginTop:20}}>Check<span className="keyhint" style={{color:'white'}}>Enter</span></button>
              :<>
              {!retype&&<div className={`feedback anim-fade ${fb.counts_as_correct?'ok':'bad'}`}>{renderText(fb.message)}</div>}
              {retype&&<div className="anim-fade" style={{marginTop:16,width:'100%',maxWidth:800,padding:'24px',background:'var(--white)',border:'2px solid var(--lgrey)',borderRadius:20}}>
                {fb?.message&&<div style={{background:'var(--coral)',color:'white',padding:'10px 18px',borderRadius:10,fontWeight:700,marginBottom:20,display:'inline-block',fontSize:'1rem'}}>{renderText(fb.message)}</div>}
                <div style={{marginBottom:24,padding:'20px',background:'#f0fdf4',border:'2px solid #16a34a',borderRadius:16,textAlign:'left',userSelect:'none',WebkitUserSelect:'none'}}><p style={{fontWeight:800,fontSize:'0.9rem',color:'#16a34a',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>The correct answer is</p><p className="latin" style={{fontSize:'1.8rem',fontWeight:800,color:'var(--dark)'}}>{correct}</p></div>
                
                <input ref={rtRef} className="typed-input" style={{...inputStyle,borderColor:rtFb?'var(--red-bright)':''}} value={rtAns} onChange={e=>{setRtAns(e.target.value);setRtFb(null)}} onPaste={e=>e.preventDefault()} placeholder="..."/>
                {rtFb&&<div style={{color:'var(--red-bright)',marginTop:12,fontWeight:700}}>{rtFb}</div>}
                <button className="btn btn-outline" disabled={busy} onClick={rtSubmit} style={{marginTop:20}}>Continue<span className="keyhint">Enter</span></button>
              </div>}
              {!retype&&<button className="btn btn-primary anim-fade" disabled={busy} onClick={nx} style={{marginTop:30}}>Next<span className="keyhint" style={{color:'white'}}>Enter</span></button>}
            </>}
          </div>
        </div></div>
      </div>
    );
  }

  // ── Verb Conjugation — principal parts + meaning drill ───────────────────────
  // Format: show all parts of a verb with one randomly blanked; also blank meaning.
  // Two boxes side by side. Tab switches between them. Both checked on Enter.
  // Wrong answers: retype the incorrect box(es) before continuing.

  // Generate "having been X" form for PPP meaning acceptance.
  // Covers regular English patterns + common irregulars found in the GCSE verb list.
  function toPPPMeaning(m){
    m=m.trim().toLowerCase().replace(/^to /,'');
    const irregs={
      'give':'given','write':'written','find':'found','take':'taken','make':'made',
      'come':'come','go':'gone','see':'seen','put':'put','set':'set','let':'let',
      'cut':'cut','get':'got','hold':'held','tell':'told','say':'said',
      'bring':'brought','lead':'led','read':'read','build':'built','send':'sent',
      'think':'thought','stand':'stood','sit':'sat','run':'run','fight':'fought',
      'catch':'caught','hear':'heard','know':'known','show':'shown','break':'broken',
      'choose':'chosen','fall':'fallen','speak':'spoken','steal':'stolen',
      'wear':'worn','drive':'driven','eat':'eaten','begin':'begun','sing':'sung',
      'throw':'thrown','grow':'grown','rise':'risen','win':'won',
      'hang':'hung','pay':'paid','lay':'laid','leave':'left','lose':'lost',
      'keep':'kept','feel':'felt','meet':'met','sell':'sold','sleep':'slept',
      'spend':'spent','teach':'taught','buy':'bought','seek':'sought',
      'flee':'fled','weep':'wept','hide':'hidden','overcome':'overcome',
      'carry out':'carried out','set free':'set free','look after':'looked after',
      'care for':'cared for','approach':'approached','surround':'surrounded',
      'attack':'attacked','praise':'praised','enter':'entered','free':'freed',
      'order':'ordered','command':'commanded','warn':'warned','advise':'advised',
      'carry':'carried','save':'saved','sail':'sailed','live':'lived',
      'march':'marched','hurry':'hurried','walk':'walked','consider':'considered',
      'watch':'watched','supervise':'supervised','demand':'demanded',
      'announce':'announced','greet':'greeted','prepare':'prepared',
      'ask':'asked','beg':'begged','promise':'promised','reply':'replied',
      'remain':'remained','report':'reported','shout':'shouted',
    };
    if(irregs[m])return `having been ${irregs[m]}`;
    if(m.endsWith('e'))return `having been ${m}d`;
    if(m.endsWith('y')&&m.length>1&&!'aeiou'.includes(m[m.length-2]))return `having been ${m.slice(0,-1)}ied`;
    return `having been ${m}ed`;
  }

  function VerbConj({pupil,set,verbs,isPreview,onDone,addC,addW,pct}){
    const partLabels=['present','infinitive','perfect','PPP'];
    const [qs]=useState(()=>shuffleOnce(verbs.map(v=>{
      const parts=[v.present,v.infinitive,v.perfect,v.ppp];
      const valid=[1,2,3].filter(i=>parts[i]!=null);
      const g=valid[Math.floor(Math.random()*valid.length)];
      return {v,g};
    })));
    const [idx,setIdx]=useState(0);
    const [partAns,setPartAns]=useState('');
    const [meaningAns,setMeaningAns]=useState('');
    const [fb,setFb]=useState(null);
    const [wrongPart,setWrongPart]=useState(false);
    const [wrongMeaning,setWrongMeaning]=useState(false);
    const [rtPartAns,setRtPartAns]=useState('');
    const [rtMeaningAns,setRtMeaningAns]=useState('');
    const [rtFb,setRtFb]=useState(null);
    const [busy,setBusy]=useState(false);
    const partRef=useRef();const meaningRef=useRef();
    const rtPartRef=useRef();const rtMeaningRef=useRef();

    if(!qs||qs.length===0){onDone();return null;}
    const {v,g}=qs[idx]||qs[0];
    const parts=[v.present,v.infinitive,v.perfect,v.ppp];
    const correctPart=parts[g];

    useEffect(()=>{
      if(!fb){partRef.current?.focus();}
      else if(wrongPart){rtPartRef.current?.focus();}
      else if(wrongMeaning){rtMeaningRef.current?.focus();}
    },[idx,fb,wrongPart,wrongMeaning]);

    const submit=async()=>{
      if(busy)return;setBusy(true);
      const [partRes,meaningRes]=await Promise.all([
        post('/api/check',{pupil_id:pupil.id,set_id:set.id,
          question_type:'latin_typed',
          question_text:`${partLabels[g]} of ${v.present}`,
          pupil_answer:partAns,correct_answer:correctPart}),
        post('/api/check',{pupil_id:pupil.id,set_id:set.id,
          question_type:'typed',
          question_text:v.present,
          pupil_answer:meaningAns,
          correct_answer:[...new Set(g===3?[...v.meanings,...v.meanings.map(toPPPMeaning)]:v.meanings)].join(', ')}),
      ]);
      if(!qs[idx].failed){
        if(partRes.counts_as_correct)addC();else addW({latin:v.present,correct:correctPart});
        if(meaningRes.counts_as_correct)addC();else addW({latin:v.present+' (meaning)',correct:v.meanings[0]});
      }
      const wp=!partRes.counts_as_correct;
      const wm=!meaningRes.counts_as_correct;
      if((wp||wm)&&!qs.find(q=>q.v===v&&q.failed))qs.push({v,g,failed:true});
      setFb({part:partRes,meaning:meaningRes});
      setWrongPart(wp);setWrongMeaning(wm);
      setBusy(false);
    };

    const rtSubmit=async()=>{
      if(busy)return;
      if(wrongPart&&!rtPartAns.trim()){setRtFb('Type the missing principal part.');return;}
      if(wrongMeaning&&!rtMeaningAns.trim()){setRtFb('Type the meaning.');return;}
      setBusy(true);
      const checks=[];
      if(wrongPart)checks.push(post('/api/check',{pupil_id:pupil.id,set_id:set.id,
        question_type:'latin_typed',question_text:`retype ${v.present}`,
        pupil_answer:rtPartAns,correct_answer:correctPart}));
      if(wrongMeaning)checks.push(post('/api/check',{pupil_id:pupil.id,set_id:set.id,
        question_type:'typed',question_text:v.present,
        pupil_answer:rtMeaningAns,
        correct_answer:[...new Set(g===3?[...v.meanings,...v.meanings.map(toPPPMeaning)]:v.meanings)].join(', ')}));
      const results=await Promise.all(checks);
      if(results.every(r=>r.counts_as_correct)){nx();}
      else{setRtFb('Not quite — check spelling and try again.');}
      setBusy(false);
    };

    const nx=()=>{
      resetScroll();
      setPartAns('');setMeaningAns('');setFb(null);
      setWrongPart(false);setWrongMeaning(false);
      setRtPartAns('');setRtMeaningAns('');setRtFb(null);
      if(idx+1>=qs.length)onDone();else setIdx(i=>i+1);
    };

    useEffect(()=>{
      const h=e=>{
        if(e.key==='Tab'&&!fb){
          e.preventDefault();
          if(document.activeElement===partRef.current)meaningRef.current?.focus();
          else partRef.current?.focus();
        }
        if(e.key==='Enter'){
          if(fb&&(wrongPart||wrongMeaning))rtSubmit();
          else if(fb&&!wrongPart&&!wrongMeaning)nx();
          else if(!fb)submit();
        }
      };
      window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
    });

    const latinStyle={fontFamily:'Crimson Text, serif',fontStyle:'italic',fontSize:'1.9rem',fontWeight:700};
    const engStyle={fontFamily:'Inter, sans-serif',fontStyle:'normal',fontSize:'1.4rem',fontWeight:600};

      gap:'4px 0',background:'white',borderRadius:16,padding:'22px 28px',
      boxShadow:'0 2px 12px rgba(0,33,71,0.08)',border:'2px solid var(--lgrey)',width:'100%',maxWidth:960};
