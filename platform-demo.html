      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><ProgressBar pct={pct}/></div>
        <div className="activity-body">
          <div style={{minHeight:32,display:'flex',justifyContent:'center',alignItems:'center',marginBottom:6}}>
            {qs[idx]?.failed&&<div className="anim-fade" style={{background:'#f97316',border:'2px solid #ea580c',borderRadius:10,padding:'5px 14px',fontWeight:800,color:'white',fontSize:'0.85rem',display:'inline-block'}}>Try again — wrong before.</div>}
          </div>
          <p style={{color:'var(--grey)',fontWeight:700,fontSize:'1.05rem',marginBottom:16}}>
            Type the missing <strong style={{color:'var(--navy)'}}>principal part</strong> and the <strong style={{color:'var(--navy)'}}>meaning</strong>:
          </p>

          {!fb?(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,width:'100%',maxWidth:960}}>
              <div style={cardStyle}>
                {parts.map((p,i)=>{
                  if(p==null)return null;
                  if(i===g)return(
                    <React.Fragment key={i}>
                      {i>0&&<span className="part-sep">/</span>}
                      <input ref={partRef} className="gap-input" value={partAns}
                        onChange={e=>setPartAns(e.target.value)} disabled={!!fb}
                        placeholder="..." style={latinStyle}/>
                    </React.Fragment>
                  );
                  return(
                    <React.Fragment key={i}>
                      {i>0&&<span className="part-sep">/</span>}
                      <span className="part-chip"><span>{renderPartWithColor(p,i)}</span></span>
                    </React.Fragment>
                  );
                })}
                <span style={{margin:'0 14px',color:'var(--lgrey)',fontSize:'1.6rem',fontWeight:200,lineHeight:1}}>|</span>
                <input ref={meaningRef} className="gap-input" value={meaningAns}
                  onChange={e=>setMeaningAns(e.target.value)} disabled={!!fb}
                  placeholder="meaning..." style={engStyle}/>
              </div>
              <p style={{fontSize:'0.8rem',color:'var(--grey)',fontStyle:'italic',marginTop:2}}>Tab to switch boxes</p>
              <button className="btn btn-primary" disabled={busy} onClick={submit} style={{marginTop:6}}>
                Check<span className="keyhint" style={{color:'white'}}>Enter</span>
              </button>
            </div>
          ):(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,width:'100%',maxWidth:960}}>
              {/* Full verb revealed */}
              <div style={cardStyle}>
                {parts.map((p,i)=>{
                  if(p==null)return null;
                  const isBlank=i===g;
                  const col=isBlank?(fb.part.counts_as_correct?'#16a34a':'var(--coral)'):'inherit';
                  return(
                    <React.Fragment key={i}>
                      {i>0&&<span className="part-sep">/</span>}
                      <span className="part-chip"><span style={{color:col,fontWeight:isBlank?800:700}}>{renderPartWithColor(p,i)}</span></span>
                    </React.Fragment>
                  );
                })}
                <span style={{margin:'0 14px',color:'var(--lgrey)',fontSize:'1.6rem',fontWeight:200,lineHeight:1}}>|</span>
                <span style={{fontWeight:700,fontSize:'1.3rem',color:fb.meaning.counts_as_correct?'#16a34a':'var(--coral)'}}>
                  {(v.meanings||[]).join(', ')}
                </span>
              </div>
              {/* Feedback chips */}
              <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
                <div className={`feedback ${fb.part.counts_as_correct?'ok':'bad'}`} style={{fontSize:'0.95rem',padding:'8px 16px'}}>
                  {fb.part.counts_as_correct?`✓ ${partLabels[g]}`:`✗ ${partLabels[g]}: ${correctPart}`}
                </div>
                <div className={`feedback ${fb.meaning.counts_as_correct?'ok':'bad'}`} style={{fontSize:'0.95rem',padding:'8px 16px'}}>
                  {fb.meaning.counts_as_correct?'✓ meaning':`✗ meaning: ${(v.meanings||[]).join(', ')}`}
                </div>
              </div>
              {/* Retype section for wrong answers */}
              {(wrongPart||wrongMeaning)&&(
                <div className="anim-fade" style={{background:'var(--white)',border:'2px solid var(--lgrey)',borderRadius:20,padding:'22px 28px',width:'100%',maxWidth:800}}>
                  <p style={{fontWeight:700,fontSize:'0.95rem',color:'var(--navy)',marginBottom:14}}>
                    Type the correct answer{wrongPart&&wrongMeaning?'s':''} to continue:
                  </p>
                  <div style={{display:'flex',flexDirection:'column',gap:14}}>
                    {wrongPart&&(
                      <div>
                        <div style={{background:'#f0fdf4',border:'2px solid #16a34a',borderRadius:10,padding:'10px 14px',marginBottom:8}}>
                          <p style={{fontWeight:800,fontSize:'0.75rem',color:'#16a34a',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:3}}>{partLabels[g]}</p>
                          <p className="latin" style={{fontSize:'1.6rem',fontWeight:800,color:'var(--dark)'}}>{correctPart}</p>
                        </div>
                        <input ref={rtPartRef} className="typed-input" style={latinStyle}
                          value={rtPartAns} onChange={e=>{setRtPartAns(e.target.value);setRtFb(null);}}
                          onPaste={e=>e.preventDefault()} placeholder="..."/>
                      </div>
                    )}
                    {wrongMeaning&&(
                      <div>
                        <div style={{background:'#f0fdf4',border:'2px solid #16a34a',borderRadius:10,padding:'10px 14px',marginBottom:8}}>
                          <p style={{fontWeight:800,fontSize:'0.75rem',color:'#16a34a',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:3}}>Meaning</p>
                          <p style={{fontSize:'1.6rem',fontWeight:800,color:'var(--dark)'}}>{(v.meanings||[]).join(', ')}</p>
                        </div>
                        <input ref={rtMeaningRef} className="typed-input" style={engStyle}
                          value={rtMeaningAns} onChange={e=>{setRtMeaningAns(e.target.value);setRtFb(null);}}
                          onPaste={e=>e.preventDefault()} placeholder="..."/>
                      </div>
                    )}
                  </div>
                  {rtFb&&<div style={{color:'var(--red-bright)',marginTop:10,fontWeight:700,fontSize:'0.95rem'}}>{rtFb}</div>}
                  <button className="btn btn-outline" disabled={busy} onClick={rtSubmit} style={{marginTop:18}}>
                    Continue<span className="keyhint">Enter</span>
                  </button>
                </div>
              )}
              {!wrongPart&&!wrongMeaning&&(
                <button className="btn btn-primary anim-fade" disabled={busy} onClick={nx}>
                  Next<span className="keyhint" style={{color:'white'}}>Enter</span>
                </button>
              )}
            </div>
          )}
        </div></div>
      </div>
    );
  }

  // ── Verb Conj FC (flashcard phase) ────────────────────────────────────────────
  // Shows all 4 principal parts as a flip-card. Front: present + 3 blanks.
  // Back: reveals infinitive / perfect / PPP. Hard/Easy rating (no marks).
  function VerbConjFC({pupil,set,verbs,isPreview,onDone,pct}){
    const [queue,setQueue]=useState(()=>[...verbs]);
    const [qIdx,setQIdx]=useState(0);
    const [rev,setRev]=useState(false);const [busy,setBusy]=useState(false);
    const [exitCls,setExitCls]=useState('');const [entering,setEntering]=useState(false);
    const [doneCount,setDoneCount]=useState(0);
    const v=queue[qIdx];
    if(!v){onDone();return null;}
    const rate=async r=>{
      if(busy)return;setBusy(true);
      if(!isPreview)await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'flashcard_rating',question_text:v.present,pupil_answer:r});
      setExitCls(r==='got_it'?'fc-exit-right':'fc-exit-left');
      const newQLen=queue.length+(r==='again'?1:0);
      if(r==='again')setQueue(q=>{const next=[...q];next.push({...v,revisit:true});return next;});
      else setDoneCount(d=>d+1);
      setTimeout(()=>{
        setExitCls('');setRev(false);setBusy(false);
        if(qIdx+1>=newQLen)onDone();
        else{setQIdx(i=>i+1);setEntering(true);setTimeout(()=>setEntering(false),230);}
      },270);
    };
    useEffect(()=>{
      const h=e=>{
        if(e.code==='Space'){e.preventDefault();if(!rev)setRev(true);else rate('got_it');return;}
        if(rev&&e.key==='1')rate('again');
        if(rev&&e.key==='2')rate('got_it');
      };
      window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
    });
    const freshInQueue=queue.slice(qIdx).filter(c=>!c.revisit).length;
    const hardInQueue=queue.slice(qIdx+1).filter(c=>c.revisit).length;
    const chipStyle=(revealed)=>({borderColor:revealed?'var(--blue)':'var(--blue)',color:revealed?'#1a73e8':'var(--blue)'});
    const parts=[
      {val:v.present,  label:'present',    idx:0, always:true},
      {val:v.infinitive,label:'infinitive', idx:1, always:false},
      {val:v.perfect,  label:'perfect',     idx:2, always:false},
      {val:v.ppp,      label:'PPP',         idx:3, always:false, noPPP:v.ppp===null},
    ];
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><ProgressBar pct={pct}/></div>
        <div className="activity-body">
          <p style={{color:'var(--grey)',marginBottom:16,fontWeight:700,fontSize:'1.2rem',textAlign:'center',width:'100%'}}>
            What are all the <strong style={{color:'var(--navy)'}}>principal parts</strong> of this verb?
          </p>
          <div style={{display:'flex',alignItems:'flex-start',gap:20,width:'100%',maxWidth:1000,justifyContent:'center'}}>
            <CardPile count={freshInQueue} hardCount={hardInQueue} side="left"/>
            <div className={`${exitCls}${entering?' fc-enter':''}`} style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',alignItems:'center'}}>
              <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:8,flexWrap:'wrap',justifyContent:'center'}}>
                {parts.map((p,i)=>(
                  <React.Fragment key={i}>
                    {i>0&&<span className="part-sep">/</span>}
                    <div style={{textAlign:'center'}}>
                      {p.always
                        ? <><span className="part-chip"><span style={{whiteSpace:'nowrap'}}>{renderPartWithColor(p.val,p.idx)}</span></span>
                            <p style={{color:'var(--grey)',fontSize:'0.82rem',marginTop:4,fontStyle:'italic'}}>{p.label}</p></>
                        : p.noPPP
                          ? <><span className="part-chip" style={{borderColor:'var(--grey)',color:'var(--grey)',fontStyle:'normal',fontSize:'0.95rem'}}>
                                {rev?'no PPP':'?'}
                              </span>
                              <p style={{color:'var(--grey)',fontSize:'0.82rem',marginTop:4,fontStyle:'italic'}}>{p.label}</p></>
                          : <><span className="part-chip" style={chipStyle(rev)}>
                                {rev?<span style={{whiteSpace:'nowrap'}}>{renderPartWithColor(p.val,p.idx)}</span>:'?'}
                              </span>
                              <p style={{color:'var(--grey)',fontSize:'0.82rem',marginTop:4,fontStyle:'italic'}}>{p.label}</p></>
                      }
                    </div>
                  </React.Fragment>
                ))}
                <span style={{margin:'0 14px',color:'var(--lgrey)',fontSize:'1.4rem',fontWeight:200}}>|</span>
                <div style={{textAlign:'center'}}>
                  <span style={{fontWeight:700,fontSize:'1.2rem',color:rev?'var(--navy)':'var(--blue)'}}>
                    {rev?(v.meanings||[]).join(', '):'?'}
                  </span>
                  <p style={{color:'var(--grey)',fontSize:'0.82rem',marginTop:4,fontStyle:'italic'}}>meaning</p>
                </div>
              </div>
            </div>
            <CardPile count={doneCount} side="right"/>
          </div>
          {rev
            ?<div className="anim-fade" style={{display:'flex',gap:32,marginTop:24}}>
               <button className="btn btn-grey" disabled={busy} onClick={()=>rate('again')}>Hard<span className="keyhint">Press 1</span></button>
               <button className="btn btn-primary" disabled={busy} onClick={()=>rate('got_it')}>Easy<span className="keyhint" style={{color:'white'}}>Press 2</span></button>
             </div>
            :<p style={{marginTop:24,color:'var(--grey)',fontSize:'1.3rem',fontWeight:700}}>Press SPACE to reveal</p>
          }
          <div style={{marginTop:16,display:'flex',gap:12,alignItems:'center'}}>
            <span style={{fontSize:'0.85rem',fontWeight:700,color:'var(--lgrey)'}}>Card {qIdx+1} of {queue.length}</span>
            <div style={{width:160,height:5,background:'var(--lgrey)',borderRadius:3,overflow:'hidden'}}>
              <div style={{width:`${((qIdx+1)/Math.max(queue.length,1))*100}%`,height:'100%',background:'var(--blue)',borderRadius:3,transition:'width .3s'}}></div>
            </div>
          </div>
        </div></div>
      </div>
    );
  }

  // ── Verb Conj MC (MCQ phase) ───────────────────────────────────────────────────
  // Shows ALL four principal parts; asks for the English meaning (4 MC options).
  function VerbConjMC({pupil,set,verbs,isPreview,onDone,addC,addW,pct}){
    const [queue,setQueue]=useState(()=>[...verbs.map(v=>({v}))]);
    const [qIdx,setQIdx]=useState(0);
    const [sel,setSel]=useState(null);const [fb,setFb]=useState(null);const [busy,setBusy]=useState(false);
    const q=queue[qIdx];
    if(!q){onDone();return null;}
    const {v}=q;
    const parts=[v.present,v.infinitive,v.perfect,v.ppp];
    const correct=v.meanings[0];
    const correctDisplay=(v.meanings||[]).join(', ');
    const isRetry=q.failed;
    // Generate options once per question
    const optsRef=useRef(null);
    if(optsRef.current===null||optsRef.current.qIdx!==qIdx){
      const others=shuffleOnce(verbs.filter(u=>u!==v));
      const ds=[];
      for(const u of others){const d=u.meanings[0];if(d&&d!==correct&&!ds.includes(d)&&ds.length<3)ds.push(d);}
      optsRef.current={qIdx,opts:shuffleOnce([correct,...ds])};
    }
    const opts=optsRef.current.opts;
    const pick=async o=>{
      if(fb||busy)return;setBusy(true);setSel(o);
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'mc',
        question_text:`meaning of ${v.present}`,pupil_answer:o,correct_answer:correct});
      setFb(res);
      if(res.counts_as_correct){if(!q.failed)addC();}
      else{if(!q.failed)addW({latin:v.present,correct});setQueue(prev=>[...prev,{v,failed:true}]);}
      setBusy(false);
    };
    const nx=()=>{resetScroll();optsRef.current=null;setSel(null);setFb(null);if(qIdx+1>=queue.length)onDone();else setQIdx(i=>i+1);};
    useEffect(()=>{
      const h=e=>{
        if(e.ctrlKey&&e.altKey&&e.code==="KeyK"){e.preventDefault();e.stopPropagation();if(!q?.failed)addC();nx();return;}
        if(e.ctrlKey&&e.altKey&&e.code==="KeyJ"){e.preventDefault();e.stopPropagation();nx();return;}
        if(fb&&(e.key==='Enter'||(e.code==='Space'&&e.target.tagName!=='INPUT'))){e.preventDefault();nx();}
        if(!fb){const n=parseInt(e.key);if(n>=1&&n<=4&&opts[n-1])pick(opts[n-1]);}
      };
      window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
    });
    const cardStyle={display:'flex',alignItems:'center',flexWrap:'wrap',justifyContent:'center',
      gap:'4px 0',background:'white',borderRadius:16,padding:'22px 28px',
      boxShadow:'0 2px 12px rgba(0,33,71,0.08)',border:'2px solid var(--lgrey)',width:'100%',maxWidth:960,marginBottom:20};
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><ProgressBar pct={pct}/></div>
        <div className="activity-body" style={{overflowY:'hidden',justifyContent:'center'}}>
          <div style={{minHeight:40,display:'flex',justifyContent:'center',alignItems:'center',marginBottom:8}}>
            {isRetry&&<div className="anim-fade" style={{background:'#f97316',border:'2px solid #ea580c',borderRadius:10,padding:'6px 16px',fontWeight:800,color:'white',fontSize:'0.9rem',display:'inline-block'}}>Try this again — you got it wrong before.</div>}
          </div>
          <p style={{color:'var(--grey)',marginBottom:16,fontWeight:700,fontSize:'1.2rem',textAlign:'center',width:'100%'}}>
            What does this verb <strong style={{color:'var(--navy)'}}>mean</strong>?
          </p>
          {/* All four parts shown */}
          <div style={cardStyle}>
            {parts.map((p,i)=>{
              if(p==null)return null;
              return(
                <React.Fragment key={i}>
                  {i>0&&<span className="part-sep">/</span>}
                  <span className="part-chip"><span style={{whiteSpace:'nowrap'}}>{renderPartWithColor(p,i)}</span></span>
                </React.Fragment>
              );
            })}
          </div>
          {/* MC options — English meanings */}
          <div className="mc-options">
            {opts.map((o,i)=>(
              <button key={i} className={`mc-opt ${fb?(o===correct?'correct':o===sel?'wrong':''):''}`}
                disabled={busy&&!fb} onClick={()=>pick(o)}>
                <span className="keyhint" style={{display:'block',marginBottom:12}}>Press {i+1}</span>
                <span style={{fontWeight:700,fontSize:'1.5rem'}}>{o===correct?correctDisplay:o}</span>
              </button>
            ))}
          </div>
          {fb&&<div className="anim-fade" style={{minHeight:80,display:'flex',flexDirection:'column',alignItems:'center'}}>
            <button className="btn btn-primary" disabled={busy} onClick={nx} style={{marginTop:16}}>
              Next<span className="keyhint" style={{color:'white'}}>Enter / Space</span>
            </button>
          </div>}
          {!fb&&<div style={{minHeight:80}}></div>}
        </div></div>
      </div>
    );
  }

  // ── Tense ID - fixed-order buttons, no timer, scaffolded forms ────────────────
  function TenseId({pupil,set,qs,isPreview,onDone,addC,addW,pct}){
    const [idx,setIdx]=useState(0);const [sel,setSel]=useState(null);const [fb,setFb]=useState(null);const [busy,setBusy]=useState(false);
    const q=qs[idx];
    const tenseOpts=set.tense_options||['present','future','imperfect','perfect','pluperfect'];
    const pick=async o=>{
      if(fb||busy)return;setBusy(true);setSel(o);
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'parsing_mcq',question_text:q.plain_form||q.form,pupil_answer:o,correct_answer:q.tense});
      setFb(res);if(res.counts_as_correct){if(!q.failed)addC()}else{if(!q.failed)addW({latin:q.form,correct:q.tense})};
      setBusy(false);
    };
    const nx=()=>{resetScroll();setFb(null);setSel(null);if(idx+1>=qs.length)onDone();else setIdx(i=>i+1)};
    useEffect(()=>{const h=e=>{if(e.ctrlKey&&e.altKey&&e.code==="KeyK"){e.preventDefault();e.stopPropagation();if(!q?.failed)addC();nx();return;}if(e.ctrlKey&&e.altKey&&e.code==="KeyJ"){e.preventDefault();e.stopPropagation();nx();return;}if(fb&&(e.key==='Enter'||(e.code==='Space'&&e.target.tagName!=='INPUT'))){e.preventDefault();nx();}if(!fb){const n=parseInt(e.key);if(n>=1&&n<=tenseOpts.length)pick(tenseOpts[n-1])}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)});
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><ProgressBar pct={pct}/></div>
        <div className="activity-body" style={{overflowY:'hidden',justifyContent:'center'}}>
          <div className="mc-prompt"><h2>What tense is {renderScaffolded(q.form)}?</h2></div>
          <div className="mc-options" style={{gridTemplateColumns:'1fr 1fr 1fr',maxWidth:1100}}>
            {tenseOpts.map((o,i)=><button key={i} className={`mc-opt ${fb?(o===q.tense?'correct':o===sel?'wrong':''):''}`} disabled={busy&&!fb} onClick={()=>pick(o)} style={{padding:'28px 16px',fontSize:'1.5rem'}}>
              <span className="keyhint" style={{display:'block',marginBottom:10}}>Press {i+1}</span>{o}
            </button>)}
          </div>
          {fb&&<div className="anim-fade" style={{minHeight:80,display:'flex',flexDirection:'column',alignItems:'center'}}>
            {fb.counts_as_correct&&<p style={{marginTop:8,fontSize:'1.2rem',color:'var(--grey)'}}><span className="latin">{q.plain_form}</span> = <em>{q.translation}</em></p>}
            <button className="btn btn-primary" disabled={busy} onClick={nx} style={{marginTop:16}}>Next<span className="keyhint" style={{color:'white'}}>Enter / Space</span></button>
          </div>}
          {!fb&&<div style={{minHeight:80}}></div>}
        </div></div>
      </div>
    );
  }

  // ── Parsing MCQ - fixed option order, 10s timer ───────────────────────────────
  // ── Translate the Form ───────────────────────────────────────────────────────
  function TranslateForm({pupil,set,qs,isPreview,onDone,addC,addW,pct}){
    const [queue,setQueue]=useState(()=>[...qs]);
    const [qIdx,setQIdx]=useState(0);
    const [sel,setSel]=useState(null);const [fb,setFb]=useState(null);const [busy,setBusy]=useState(false);
    const [timeLeft,setTimeLeft]=useState(10);
    const q=queue[qIdx];
    
    useEffect(()=>{
      if(fb||busy||!q||q.failed)return; // no timer on retries
      if(timeLeft<=0){
        const handleTimeout=async()=>{
          setBusy(true);setSel('timeout');
          const res={counts_as_correct:false,timeout:true,message:`${timeoutBadge()} The correct answer is: **${q.correct}**`};
          if(!isPreview)await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'translate_form',question_text:q.form,pupil_answer:'TIMEOUT',correct_answer:q.correct});
          setFb(res);if(!q.failed)addW({latin:q.form,correct:q.correct});
          setQueue(prev=>[...prev,{...q,failed:true}]);
          setBusy(false);
        };handleTimeout();return;
      }
      const t=setInterval(()=>setTimeLeft(x=>x-1),1000);return()=>clearInterval(t);
    },[timeLeft,fb,busy,q,isPreview,pupil.id,set.id,addW]);

    const nx=()=>{resetScroll();setSel(null);setFb(null);setTimeLeft(10);if(qIdx+1>=queue.length)onDone();else setQIdx(i=>i+1)};
    const pick=async(o)=>{
      if(fb||busy||!q)return;setBusy(true);setSel(o);
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'translate_form',
        question_text:q.form,pupil_answer:o,correct_answer:q.correct});
      setFb(res);
      if(res.counts_as_correct){if(!q.failed)addC();}
      else{
        if(!q.failed){addW({latin:q.form,correct:q.correct});}
        // Re-add to queue for retry
        setQueue(prev=>[...prev,{...q,failed:true}]);
      }
      setBusy(false);
    };
    useEffect(()=>{
      const h=e=>{
        if(fb&&(e.key==='Enter'||(e.code==='Space'&&e.target.tagName!=='INPUT'))){e.preventDefault();nx();return;}
        if(!fb&&q){const n=parseInt(e.key);if(n>=1&&n<=(q.options?.length||0))pick(q.options[n-1]);}
      };
      window.addEventListener('keydown',h);
      return()=>window.removeEventListener('keydown',h);
    });
    if(!q)return null;
    const isRetry=q.failed;
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade">
          <div className="activity-bar"><ProgressBar pct={pct}/></div>
          {!isRetry&&<div style={{padding:'12px 40px 4px',width:'100%',maxWidth:1000,alignSelf:'center',boxSizing:'border-box'}}>
            <div className="timer-bar" style={{margin:0}}><div className="timer-fill" style={{width:`${(timeLeft/10)*100}%`,background:fb?(fb.counts_as_correct?'var(--green-bright)':'var(--red-bright)'):(timeLeft<=3?'var(--red-bright)':'var(--blue)'),transition:fb?'none':'width 1s linear, background .3s'}}></div></div>
          </div>}
        <div className="activity-body" style={{overflowY:'hidden',justifyContent:'center',paddingTop:36}}>
          <div style={{minHeight:40,display:'flex',justifyContent:'center',alignItems:'center',marginBottom:8}}>
            {isRetry&&<div className="anim-fade" style={{background:'#f97316',border:'2px solid #ea580c',borderRadius:10,padding:'6px 16px',fontWeight:800,color:'white',fontSize:'0.9rem',display:'inline-block'}}>Try this again — you got it wrong before.</div>}
            {fb?.timeout&&<div className="anim-fade" style={{background:'var(--red-bright)',border:'2px solid #b91c1c',borderRadius:10,padding:'6px 16px',fontWeight:800,color:'white',fontSize:'0.9rem',display:'inline-block'}}>{timeoutBadge()}</div>}
          </div>
          <div className="mc-prompt"><h1 className="latin dynamic-latin" style={{fontSize:'3.8rem'}}>{q.form}</h1></div>
          <p style={{color:'var(--grey)',marginBottom:24,fontWeight:700}}>What does this mean?</p>
          <div className="mc-options" style={{gridTemplateColumns:'1fr 1fr 1fr',maxWidth:1000}}>
            {(q.options||[]).map((o,i)=>(
              <button key={i} className={`mc-opt ${fb?(o===q.correct?'correct':o===sel?'wrong':''):''}`}
                disabled={busy&&!fb} onClick={()=>pick(o)}>
                <span className="keyhint" style={{display:'block',marginBottom:8}}>Press {i+1}</span>
                {o}
              </button>
            ))}
          </div>
          {fb&&<div className="anim-fade" style={{display:'flex',flexDirection:'column',alignItems:'center',marginTop:16}}>
            <button className="btn btn-primary" onClick={nx} style={{marginTop:12}}>Next<span className="keyhint" style={{color:'white'}}>Enter / Space</span></button>
          </div>}
        </div></div>
      </div>
    );
  }


  // ── Full Parsing (Hoi Polloi Logoi style) ─────────────────────────────────
  // Student clicks Tense + Person + Number buttons, then presses Check
  function FullParsing({pupil,set,qs,isPreview,onDone,addC,addW,pct}){
    const TENSES=['present','future','imperfect','perfect','pluperfect'];
    const PERSON_NUMBERS=[
        {id:'1-s',label:'I',p:'1st',n:'singular'},{id:'2-s',label:'you (sg)',p:'2nd',n:'singular'},{id:'3-s',label:'he/she/it',p:'3rd',n:'singular'},
        {id:'1-p',label:'we',p:'1st',n:'plural'},{id:'2-p',label:'you (pl.)',p:'2nd',n:'plural'},{id:'3-p',label:'they',p:'3rd',n:'plural'}
    ];
    const [idx,setIdx]=useState(0);
    const [selTense,setSelTense]=useState(null);
    const [selPerson,setSelPerson]=useState(null);
    const [selNumber,setSelNumber]=useState(null);
    const selPN = (selPerson && selNumber) ? `${selPerson}-${selNumber}`.substring(0,3) : null;
    const [fb,setFb]=useState(null);
    const [busy,setBusy]=useState(false);
    const q=qs[idx];
    const nx=()=>{resetScroll();setSelTense(null);setSelPerson(null);setSelNumber(null);setFb(null);if(idx+1>=qs.length)onDone();else setIdx(i=>i+1)};
    const check=async()=>{
      if(!selTense||!selPerson||!selNumber||busy)return;
      setBusy(true);
      const correctKey=`${q.tense}|${q.person}|${q.number}`;
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'parsing',
        question_text:q.plain||q.form,pupil_answer:`${selTense}|${selPerson}|${selNumber}`,
        correct_answer:correctKey,tense:selTense,person:selPerson,number:selNumber});
      setFb(res);
      if(res.counts_as_correct){if(!q.failed)addC();}
      else{if(!q.failed)addW({latin:q.form,correct:`${q.tense} ${q.person} ${q.number}`});}
      setBusy(false);
    };
    useEffect(()=>{const h=e=>{if(fb&&e.key==='Enter')nx();if(!fb&&e.key==='Enter'&&selTense&&selPerson&&selNumber)check();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);});
    const BtnGroup=({options,selected,onSelect,label,correctVal})=>(
      <div style={{marginBottom:20}}>
        <p style={{fontWeight:800,color:'var(--grey)',fontSize:'0.85rem',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>{label}</p>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
          {options.map(o=>{
            const isSel=o===selected;
            const isRight=fb&&(fb.counts_as_correct?isSel:isSel&&o===correctVal);
            const isWrong=fb&&isSel&&!fb.counts_as_correct&&o!==correctVal;
            const bg=fb?(isRight?'var(--green-bright)':isWrong?'var(--red-bright)':isSel?'var(--navy)':'var(--white)'):(isSel?'var(--navy)':'var(--white)');
            const bd=fb?(isRight?'var(--green-bright)':isWrong?'var(--red-bright)':isSel?'var(--navy)':'var(--lgrey)'):(isSel?'var(--navy)':'var(--lgrey)');
            return <button key={o} disabled={!!fb}
              onClick={()=>onSelect(o===selected?null:o)}
              style={{padding:'10px 20px',borderRadius:12,border:`2px solid ${bd}`,
                background:bg,color:(isSel||isRight)?'var(--white)':'var(--dark)',
                fontWeight:700,fontSize:'1rem',cursor:fb?'default':'pointer',transition:'all .15s'}}>
              {o}
            </button>;
          })}
        </div>
      </div>
    );
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><ProgressBar pct={pct}/></div>
        <div className="activity-body">
          <div className="flashcard" style={{maxWidth:800}}>
            <h1 className="latin dynamic-latin" style={{fontSize:q?.form?.length>15?'2.8rem':'3.6rem',marginBottom:24}}>{q?.form}</h1>
            {q?.translation&&!fb&&<p style={{color:'var(--grey)',fontSize:'1rem',marginBottom:20,fontStyle:'italic'}}>({q.translation})</p>}
            <div style={{marginBottom:20}}>
              <p style={{fontWeight:800,color:'var(--grey)',fontSize:'0.85rem',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Person / Number</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                {PERSON_NUMBERS.map(pn=>{
                  const isSel=pn.id===selPN;
                  const pnIsCorrect=pn.p===q?.person&&pn.n===q?.number;
                  const isRight=fb&&(fb.counts_as_correct?isSel:isSel&&pnIsCorrect);
                  const isWrong=fb&&isSel&&!fb.counts_as_correct&&!pnIsCorrect;
                  const bg=fb?(isRight?'var(--green-bright)':isWrong?'var(--red-bright)':isSel?'var(--navy)':'var(--white)'):(isSel?'var(--navy)':'var(--white)');
                  const bd=fb?(isRight?'var(--green-bright)':isWrong?'var(--red-bright)':isSel?'var(--navy)':'var(--lgrey)'):(isSel?'var(--navy)':'var(--lgrey)');
                  return <button key={pn.id} disabled={!!fb}
                    onClick={()=>{if(pn.id===selPN){setSelPerson(null);setSelNumber(null)}else{setSelPerson(pn.p);setSelNumber(pn.n)}}}
                    style={{padding:'14px 10px',borderRadius:12,border:`2px solid ${bd}`,
                      background:bg,color:(isSel||isRight)?'var(--white)':'var(--dark)',
                      fontWeight:700,fontSize:'1.1rem',cursor:fb?'default':'pointer',transition:'all .15s'}}>
                    {pn.label}
                  </button>;
                })}
              </div>
            </div>
            <BtnGroup label="Tense" options={TENSES} selected={selTense} onSelect={setSelTense} correctVal={q?.tense}/>
            {fb&&!fb.counts_as_correct&&<div className="feedback anim-fade bad" style={{marginTop:12}}>{renderText(fb.message)}</div>}
          </div>
          {!fb&&<button className="btn btn-primary" disabled={!selTense||!selPerson||!selNumber||busy}
            onClick={check} style={{marginTop:30,opacity:(!selTense||!selPerson||!selNumber)?0.4:1}}>
            Check<span className="keyhint" style={{color:'white'}}>Enter</span>
          </button>}
          {fb&&<button className="btn btn-primary anim-fade" onClick={nx} style={{marginTop:30}}>
            Next<span className="keyhint" style={{color:'white'}}>Enter</span>
          </button>}
          <p style={{marginTop:16,color:'var(--lgrey)',fontSize:'0.9rem',fontWeight:700}}>
            Question {idx+1} of {qs.length}
          </p>
        </div></div>
      </div>
    );
  }


  function Parsing({pupil,set,qs,isPreview,onDone,addC,addW,pct}){
    const [idx,setIdx]=useState(0);const [sel,setSel]=useState(null);const [fb,setFb]=useState(null);const [busy,setBusy]=useState(false);
    const [timeLeft,setTimeLeft]=useState(10);
    const q=qs[idx];

    useEffect(()=>{
      if(fb||busy||!q)return;
      if(timeLeft<=0){
        const handleTimeout=async()=>{
          setBusy(true);setSel('timeout');
          const res={counts_as_correct:false,timeout:true,message:`${timeoutBadge()} The correct answer is: **${q.correct}**`};
          if(!isPreview)await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'parsing_mcq',question_text:q.plain_form||q.form,pupil_answer:'TIMEOUT',correct_answer:q.correct});
          setFb(res);if(!q.failed)addW({latin:q.form,correct:q.correct});setBusy(false);
        };handleTimeout();return;
      }
      const t=setInterval(()=>setTimeLeft(x=>x-1),1000);return()=>clearInterval(t);
    },[timeLeft,fb,busy,q]);

    const pick=async o=>{
      if(fb||busy||!q)return;setBusy(true);setSel(o);
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'parsing_mcq',question_text:q.plain_form||q.form,pupil_answer:o,correct_answer:q.correct});
      setFb(res);if(res.counts_as_correct){if(!q.failed)addC()}else{if(!q.failed)addW({latin:q.form,correct:q.correct})};
      setBusy(false);
    };
    const nx=()=>{resetScroll();setFb(null);setSel(null);setTimeLeft(10);if(idx+1>=qs.length)onDone();else setIdx(i=>i+1)};
    useEffect(()=>{const h=e=>{if(fb&&(e.key==='Enter'||(e.code==='Space'&&e.target.tagName!=='INPUT'))){e.preventDefault();nx();}if(!fb&&q){const n=parseInt(e.key);if(n>=1&&n<=4&&q.options)pick(q.options[n-1])}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)});

    if(!q)return null;

    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade">
          <div className="activity-bar"><ProgressBar pct={pct}/></div>
          <div style={{padding:'12px 40px 4px',width:'100%',maxWidth:1000,alignSelf:'center',boxSizing:'border-box'}}>
            <div className="timer-bar" style={{margin:0}}><div className="timer-fill" style={{width:`${(timeLeft/10)*100}%`,background:fb?(fb.counts_as_correct?'var(--green-bright)':'var(--red-bright)'):(timeLeft<=3?'var(--red-bright)':'var(--blue)'),transition:fb?'none':'width 1s linear, background .3s'}}></div></div>
          </div>
        <div className="activity-body" style={{overflowY:'hidden',justifyContent:'center',paddingTop:36}}>
          <div style={{minHeight:40,display:'flex',justifyContent:'center',alignItems:'center',marginBottom:8}}>
            {fb?.timeout&&<div className="anim-fade" style={{background:'var(--red-bright)',border:'2px solid #b91c1c',borderRadius:10,padding:'6px 16px',fontWeight:800,color:'white',fontSize:'0.9rem',display:'inline-block'}}>{timeoutBadge()}</div>}
          </div>
          <div className="mc-prompt"><h1 className="latin dynamic-latin" style={{fontSize:q?.form?.length>20?'3rem':'4rem'}}>{q?.plain_form||q?.form}</h1></div>
          <div className="mc-options" style={{gridTemplateColumns:'1fr 1fr',maxWidth:800}}>
            {(q.options||[]).map((o,i)=><button key={i} className={`mc-opt ${fb?(o===q.correct?'correct':o===sel?'wrong':''):''}`} disabled={busy&&!fb} onClick={()=>pick(o)}><span className="keyhint" style={{display:'block',marginBottom:12}}>Press {i+1}</span>{o}</button>)}
          </div>
          {fb&&<div className="anim-fade" style={{minHeight:80,display:'flex',flexDirection:'column',alignItems:'center'}}>
            <button className="btn btn-primary" disabled={busy} onClick={nx} style={{marginTop:16}}>Next<span className="keyhint" style={{color:'white'}}>Enter / Space</span></button>
          </div>}
          {!fb&&<div style={{minHeight:80}}></div>}
        </div></div>
      </div>
    );
  }

  // ── Sentences ─────────────────────────────────────────────────────────────────
  // ── Noun Table (two-mode: full-screen modal default + draggable widget) ──────
  function NounTable({onClose,onModeChange=()=>{}}){
    const [neuters,setNeuters]=React.useState(true);  // modal default: on
    const [d4,setD4]=React.useState(true);
    const [d5,setD5]=React.useState(true);
    const [tableMode,setTableMode]=React.useState('modal'); // 'modal' | 'widget'
    const [hoverEnding,setHoverEnding]=React.useState(null);
    // Compare endings ignoring vowel length (macrons)
    const normE=s=>s.replace(/[āàáâ]/g,'a').replace(/[ēèéê]/g,'e').replace(/[īìíî]/g,'i').replace(/[ōòóô]/g,'o').replace(/[ūùúû]/g,'u').toLowerCase();
    const [pos,setPos]=React.useState({x:Math.max(0,window.innerWidth-340),y:70});
    const dragRef=React.useRef(null);
    React.useEffect(()=>{
      const onMove=e=>{
        if(!dragRef.current)return;
        if(e.cancelable)e.preventDefault();
        const cx=e.touches?e.touches[0].clientX:e.clientX;
        const cy=e.touches?e.touches[0].clientY:e.clientY;
        const {startX,startY,ox,oy}=dragRef.current;
        setPos({x:Math.max(0,Math.min(ox+(cx-startX),window.innerWidth-350)),y:Math.max(0,oy+(cy-startY))});
      };
      const onUp=()=>{dragRef.current=null;};
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
      window.addEventListener('touchmove',onMove,{passive:false});
      window.addEventListener('touchend',onUp);
      return()=>{
        window.removeEventListener('mousemove',onMove);
        window.removeEventListener('mouseup',onUp);
        window.removeEventListener('touchmove',onMove);
        window.removeEventListener('touchend',onUp);
      };
    },[]);
    const startDrag=e=>{
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      const cy=e.touches?e.touches[0].clientY:e.clientY;
      dragRef.current={startX:cx,startY:cy,ox:pos.x,oy:pos.y};
      e.preventDefault();
    };
    const sg=[
      {d1:'-a',  d2m:'-us', d2n:'-um', d3:'—',   d3n:'—',   d4:'-us', d5:'-es'},
      {d1:'-am', d2m:'-um', d2n:'-um', d3:'-em', d3n:'—',   d4:'-um', d5:'-em'},
      {d1:'-ae', d2m:'-i',  d2n:'-i',  d3:'-is', d3n:'-is', d4:'-us', d5:'-ei'},
      {d1:'-ae', d2m:'-o',  d2n:'-o',  d3:'-i',  d3n:'-i',  d4:'-ui', d5:'-ei'},
      {d1:'-a',  d2m:'-o',  d2n:'-o',  d3:'-e',  d3n:'-e',  d4:'-u',  d5:'-e'},
    ];
    const pl=[
      {d1:'-ae',   d2m:'-i',    d2n:'-a',    d3:'-es',   d3n:'-a',   d4:'-us',   d5:'-es'},
      {d1:'-as',   d2m:'-os',   d2n:'-a',    d3:'-es',   d3n:'-a',   d4:'-us',   d5:'-es'},
      {d1:'-arum', d2m:'-orum', d2n:'-orum', d3:'-um',   d3n:'-um',  d4:'-uum',  d5:'-erum'},
      {d1:'-is',   d2m:'-is',   d2n:'-is',   d3:'-ibus', d3n:'-ibus',d4:'-ibus', d5:'-ebus'},
      {d1:'-is',   d2m:'-is',   d2n:'-is',   d3:'-ibus', d3n:'-ibus',d4:'-ibus', d5:'-ebus'},
    ];
    const cols=[
      {k:'d1', hd:'1ST', sub:'FEM.',    grp:1,neut:false},
      {k:'d2m',hd:'2ND', sub:'MASC.',   grp:2,neut:false},
      ...(neuters?[{k:'d2n',hd:'2ND',sub:'NEUT.',grp:2,neut:true}]:[]),
      {k:'d3', hd:'3RD', sub:'M. / F.', grp:3,neut:false},
      ...(neuters?[{k:'d3n',hd:'3RD',sub:'NEUT.',grp:3,neut:true}]:[]),
      ...(d4?[{k:'d4',hd:'4TH',sub:'M. / F.',grp:4,neut:false}]:[]),
      ...(d5?[{k:'d5',hd:'5TH',sub:'FEM.',    grp:5,neut:false}]:[]),
    ];
    const getBL=(col,i)=>{
      if(i===0)return'none';
      const prev=cols[i-1];
      if(prev.grp!==col.grp)return'2px solid #7C3AED';
      if(col.neut)return'2px dashed #C4B5FD';
      return'none';
    };
    const isModal=tableMode==='modal';
    const CW=isModal?96:50; const caseW=isModal?150:50;
    const cbSize=isModal?'1rem':'0.7rem'; const cellSize=isModal?'1.45rem':'0.95rem';
    const caseNames=isModal
      ?['NOMINATIVE','ACCUSATIVE','GENITIVE','DATIVE','ABLATIVE']
      :['NOM','ACC','GEN','DAT','ABL'];
    const cellSt=(col,i)=>({textAlign:'center',width:CW,minWidth:CW,maxWidth:CW,padding:'4px 0',fontFamily:'Crimson Text,serif',fontStyle:'italic',fontWeight:700,fontSize:cellSize,color:'#111',borderLeft:getBL(col,i)});
    const caseSt={width:caseW,minWidth:caseW,padding:'4px 6px 4px 0',fontWeight:800,fontSize:cbSize,color:'#7C3AED',textAlign:'right',whiteSpace:'nowrap',letterSpacing:'0.04em'};
    const hdSt=(col,i)=>({textAlign:'center',width:CW,minWidth:CW,maxWidth:CW,padding:'5px 0',borderBottom:'2px solid #7C3AED',color:'#7C3AED',fontSize:'0.62rem',fontWeight:900,whiteSpace:'nowrap',letterSpacing:'0.07em',borderLeft:getBL(col,i)});
    const secSt={padding:'5px 0 2px',fontWeight:800,fontSize:'0.6rem',color:'#A78BFA',textTransform:'uppercase',letterSpacing:'0.09em'};
    const renderRows=rows=>rows.map((r,i)=>(
      <tr key={i} style={{background:i%2===0?'#FAF8FF':'var(--white)'}}>
        <td style={caseSt}>{caseNames[i]}</td>
        {cols.map((c,ci)=>{
          const v=r[c.k];
          const hilite=hoverEnding!==null&&normE(v)===normE(hoverEnding);
          return <td key={c.k}
            style={{...cellSt(c,ci),background:hilite?'#ede9fe':'inherit',color:hilite?'#7C3AED':'#111',transition:'background .1s,color .1s',cursor:'default',borderRadius:hilite?3:0}}
            onMouseEnter={()=>setHoverEnding(v)}
            onMouseLeave={()=>setHoverEnding(null)}
          >{v}</td>;
        })}
      </tr>
    ));
    const checkboxes=(
      <div style={{display:'flex',gap:10,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
        {[['neuters',neuters,setNeuters,'Neuters'],['d4',d4,setD4,'4th'],['d5',d5,setD5,'5th']].map(([k,v,sv,lbl])=>(
          <label key={k} style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',fontSize:isModal?'0.8rem':'0.72rem',fontWeight:700,color:'#374151',userSelect:'none'}}>
            <input type="checkbox" checked={v} onChange={e=>sv(e.target.checked)} style={{width:isModal?13:11,height:isModal?13:11,cursor:'pointer',accentColor:'#7C3AED'}}/>{lbl}
          </label>
        ))}
      </div>
    );
    const tableEl=(
      <table style={{borderCollapse:'collapse'}}>
        <thead>
          <tr>
            <th style={{...caseSt,borderBottom:'2px solid #7C3AED',textAlign:'right'}}></th>
            {cols.map((c,ci)=><th key={c.k} style={hdSt(c,ci)}>{c.hd}<br/><span style={{fontWeight:600,color:'#A78BFA',fontSize:'0.54rem',letterSpacing:'0.01em'}}>{c.sub}</span></th>)}
          </tr>
        </thead>
        <tbody>
          <tr><td colSpan={cols.length+1} style={secSt}>Singular</td></tr>
          {renderRows(sg)}
          <tr><td colSpan={cols.length+1} style={{...secSt,paddingTop:8}}>Plural</td></tr>
          {renderRows(pl)}
        </tbody>
      </table>
    );
    if(isModal) return(

    const [busy,setBusy]=useState(false);const inRef=useRef();const rtRef=useRef();const bodyRef=useRef();
    const q=queue[qIdx];
    useEffect(()=>{if(!fb)inRef.current?.focus();if(retype)rtRef.current?.focus()},[qIdx,fb,retype]);
    useEffect(()=>{if(fb&&bodyRef.current)bodyRef.current.scrollTop=0;},[fb]);

      if(busy)return;setBusy(true);

      else{if(!q.failed)addW({latin:q.latin,correct:res.correct_answer});setQueue(prev=>[...prev,{...q,failed:true}]);setRetype(true);}
      setBusy(false);
    };
    const rtSubmit=async()=>{
      if(busy)return;
      if(!rtAns.trim()){setRtFb('Type your answer first.');return;}
      setBusy(true);
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'sentence',question_text:q.latin,pupil_answer:rtAns,correct_answer:'',sentence_index:q.original_index});

        // Ctrl+Alt+K: mark this question CORRECT and skip ahead (teacher override)
        if(e.ctrlKey&&e.altKey&&e.code==="KeyK"){e.preventDefault();e.stopPropagation();if(!q?.failed)addC();nx();return;}
        // Ctrl+Alt+J: skip without recording (neither correct nor wrong)
        if(e.ctrlKey&&e.altKey&&e.code==="KeyJ"){e.preventDefault();e.stopPropagation();nx();return;}
        if(e.key==='Enter'||(e.code==='Space'&&e.target.tagName!=='INPUT')){

    const sameTokens=(a,b)=>{const sa=normTokenSet(a),sb=normTokenSet(b);if(sa.size!==sb.size)return false;for(const x of sa)if(!sb.has(x))return false;return true;};

  // ── Parse and Translate (review set) ─────────────────────────────────────────
  function ParseAndTranslate({pupil,set,qs,isPreview,onDone,addC,addW,pct}){
    const TENSES=['present','future','imperfect','perfect','pluperfect'];
    const PERSON_NUMBERS=[
      {id:'1-s',label:'I',p:'1st',n:'singular'},{id:'2-s',label:'you (sg)',p:'2nd',n:'singular'},{id:'3-s',label:'he/she/it',p:'3rd',n:'singular'},
      {id:'1-p',label:'we',p:'1st',n:'plural'},{id:'2-p',label:'you (pl)',p:'2nd',n:'plural'},{id:'3-p',label:'they',p:'3rd',n:'plural'}
    ];
    const [idx,setIdx]=useState(0);
    const [selTense,setSelTense]=useState(null);
    const [selPerson,setSelPerson]=useState(null);
    const [selNumber,setSelNumber]=useState(null);
    const [transAns,setTransAns]=useState('');
    const [fb,setFb]=useState(null);
    const [busy,setBusy]=useState(false);
    const inRef=useRef();
    const selPN=(selPerson&&selNumber)?`${selPerson[0]}-${selNumber[0]}`:null;
    const q=qs[idx];
    useEffect(()=>{if(!fb)inRef.current?.focus()},[idx,fb]);
    const nx=()=>{resetScroll();setSelTense(null);setSelPerson(null);setSelNumber(null);setTransAns('');setFb(null);if(idx+1>=qs.length)onDone();else setIdx(i=>i+1)};
    const check=async()=>{
      if(!selTense||!selPerson||!selNumber||!transAns.trim()||busy)return;
      setBusy(true);
      const correctKey=`${q.tense}|${q.person}|${q.number}|${q.translation}`;
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'parse_translate',
        question_text:q.form,pupil_answer:transAns,correct_answer:correctKey,
        tense:selTense,person:selPerson,number:selNumber});
      setFb(res);
      if(res.counts_as_correct){addC();}
      else{addW({latin:q.form,correct:`${q.tense} ${q.person} ${q.number}: ${q.translation}`});}
      setBusy(false);
    };
    useEffect(()=>{const h=e=>{if(fb&&e.key==='Enter')nx();if(!fb&&e.key==='Enter'&&selTense&&selPerson&&selNumber&&transAns.trim())check();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);});
    if(!q)return null;
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><ProgressBar pct={pct}/></div>
        <div className="activity-body">
          <p style={{color:'var(--grey)',marginBottom:8,fontWeight:700,fontSize:'1.2rem'}}>Parse this verb and translate it into English:</p>
          <h1 className="latin dynamic-latin" style={{fontSize:'4rem',marginBottom:24}}>{q.form}</h1>
          <div style={{background:'var(--white)',borderRadius:20,padding:'32px 40px',maxWidth:860,width:'100%',boxShadow:'0 8px 24px rgba(0,0,0,.06)',marginBottom:24}}>
            <div style={{marginBottom:20}}>
              <p style={{fontWeight:800,color:'var(--grey)',fontSize:'0.85rem',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Person / Number</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                {PERSON_NUMBERS.map(pn=>{
                  const isSel=pn.p===selPerson&&pn.n===selNumber;
                  const pnIsCorrect=pn.p===q.person&&pn.n===q.number;
                  const isRight=fb&&(fb.counts_as_correct?isSel:isSel&&pnIsCorrect);
                  const isWrong=fb&&isSel&&!fb.counts_as_correct&&!pnIsCorrect;
                  return <button key={pn.id} disabled={!!fb}
                    onClick={()=>{if(isSel){setSelPerson(null);setSelNumber(null)}else{setSelPerson(pn.p);setSelNumber(pn.n)}}}
                    style={{padding:'14px 10px',borderRadius:12,
                      border:`2px solid ${fb&&isSel?(isRight?'var(--green-bright)':isWrong?'var(--red-bright)':'var(--navy)'):(isSel?'var(--navy)':'var(--lgrey)')}`,
                      background:fb&&isSel?(isRight?'var(--green-bright)':isWrong?'var(--red-bright)':'var(--navy)'):(isSel?'var(--navy)':'var(--white)'),
                      color:isSel?'var(--white)':'var(--dark)',
                      fontWeight:700,fontSize:'1rem',cursor:fb?'default':'pointer',transition:'all .15s'}}>
                    {pn.label}
                  </button>;
                })}
              </div>
            </div>
            <div style={{marginBottom:20}}>
              <p style={{fontWeight:800,color:'var(--grey)',fontSize:'0.85rem',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Tense</p>
              <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
                {TENSES.map(t=>{
                  const isSel=t===selTense;
                  const isRight=fb&&(fb.counts_as_correct?isSel:isSel&&t===q.tense);
                  const isWrong=fb&&isSel&&!fb.counts_as_correct&&t!==q.tense;
                  return <button key={t} disabled={!!fb}
                    onClick={()=>setSelTense(t===selTense?null:t)}
                    style={{padding:'10px 20px',borderRadius:12,
                      border:`2px solid ${fb&&isSel?(isRight?'var(--green-bright)':isWrong?'var(--red-bright)':'var(--navy)'):(isSel?'var(--navy)':'var(--lgrey)')}`,
                      background:fb&&isSel?(isRight?'var(--green-bright)':isWrong?'var(--red-bright)':'var(--navy)'):(isSel?'var(--navy)':'var(--white)'),
                      color:isSel?'var(--white)':'var(--dark)',
                      fontWeight:700,fontSize:'1rem',cursor:fb?'default':'pointer',transition:'all .15s'}}>
                    {t}
                  </button>;
                })}
              </div>
            </div>
            <div>
              <p style={{fontWeight:800,color:'var(--grey)',fontSize:'0.85rem',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Translation</p>
              <input ref={inRef} className={`typed-input ${fb?(fb.counts_as_correct?'ok':'bad'):''}`}
                value={transAns} onChange={e=>setTransAns(e.target.value)} disabled={!!fb}
                placeholder="Type the English translation..." style={{fontSize:'1.5rem',padding:'20px 28px'}}/>
            </div>
          </div>
          {fb&&!fb.counts_as_correct&&<div className="feedback anim-fade bad" style={{maxWidth:860,marginBottom:16}}>{renderText(fb.message)}</div>}
          {!fb&&<button className="btn btn-primary" disabled={!selTense||!selPerson||!selNumber||!transAns.trim()||busy}
            onClick={check} style={{opacity:(!selTense||!selPerson||!selNumber||!transAns.trim())?0.4:1}}>
            Check<span className="keyhint" style={{color:'white'}}>Enter</span>
          </button>}
          {fb&&<button className="btn btn-primary anim-fade" onClick={nx}>
            Next<span className="keyhint" style={{color:'white'}}>Enter</span>
          </button>}
          <p style={{marginTop:16,color:'var(--lgrey)',fontSize:'0.9rem',fontWeight:700}}>
            Question {idx+1} of {qs.length}
          </p>
        </div></div>
      </div>
    );
  }

  // ── Results ───────────────────────────────────────────────────────────────────
  function Confetti(){
    // Pure CSS confetti: 80 pieces in mixed colours falling from top
    const pieces=[];
    const colours=['#fbbf24','#16a34a','#2563eb','#dc2626','#a855f7','#ec4899','#14b8a6'];
    for(let i=0;i<80;i++){
      pieces.push({left:Math.random()*100,delay:Math.random()*1.2,colour:colours[i%colours.length],rot:Math.random()*360,dur:2.8+Math.random()*1.6});
    }
    return <>{pieces.map((p,i)=><span key={i} className="confetti-piece" style={{left:p.left+'%',background:p.colour,animationDelay:p.delay+'s',animationDuration:p.dur+'s',transform:`rotate(${p.rot}deg)`}}/>)}</>;
  }
  function Results({res,set,total,onFinish,onSaveAndNext,onPracticeWrongs}){
    const score=total>0?Math.min(100,Math.round((res.correct/total)*100)):100;
    const passMark=set.pass_mark||80;
    const passed=score>=passMark;
    const [nextN,setNextN]=useState(null);
    useEffect(()=>{api('/api/sets').then(all=>{const idx=all.findIndex(x=>x.id===set.id);setNextN(idx>=0&&idx+1<all.length?all[idx+1]:null);})},[set.id]);
    const showQuickReviewKey=res.wrong.length>0&&set.type!=='sentences'&&set.type!=='review';
    useEffect(()=>{const h=e=>{if(e.key==='Escape')onFinish(score);if(e.key===' ')e.preventDefault();if(e.key==='Enter'||e.key===' '){if(e.key===' '&&showQuickReviewKey)onPracticeWrongs();else if(passed&&nextN)onSaveAndNext(score,nextN);else if(showQuickReviewKey)onPracticeWrongs();else if(!passed)onSaveAndNext(score,set);else onFinish(score)}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[score,passed,nextN,showQuickReviewKey]);
    // Tiered message
    let tier,heading,subtitle;
    if(score>=100){tier='gold';heading='TRAILBLAZER!';subtitle='A perfect score. Every single answer correct.';}
    else if(score>=95){tier='gold';heading='PHENOMENAL!';subtitle='Near perfect — this material is locked in.';}
    else if(score>=90){tier='gold';heading='SUPERB!';subtitle='Excellent work. One more push and it\'s perfect.';}
    else if(score>=85){tier='gold';heading='GREAT!';subtitle='Well above the pass mark. Keep that momentum going.';}
    else if(score>=80){tier='gold';heading='PASSED!';subtitle='You\'ve met the mark. Carry that precision into the next set.';}
    else if(score>=60){tier='orange';heading='KEEP PRACTISING!';subtitle='Practise the items you missed, then redo the whole set.';}
    else {tier='red';heading='KEEP PRACTISING!';subtitle='Review your wrongs carefully, then redo the set from scratch.';}
    // Barrel roll easter egg — fires 30s after any pass (≥80%), once per session
    const barrelFiredRef=useRef(false);
    useEffect(()=>{
      if(!passed||barrelFiredRef.current)return;
      const t=setTimeout(()=>{
        if(barrelFiredRef.current)return;
        barrelFiredRef.current=true;
        const body=document.body;
        body.classList.remove('barrel-rolling');void body.offsetWidth;
        body.classList.add('barrel-rolling');
        body.addEventListener('animationend',()=>body.classList.remove('barrel-rolling'),{once:true});
      },30000);
      return()=>clearTimeout(t);
    },[passed]);
    // Quick review only meaningful where wrongs are atomic items (vocab / verbs / parsing / tense_id / translate_form / building_parts).
    // For sentences and review sets, "redoing wrongs" = redoing the same sentences = same as retry, so we hide it.
    const showQuickReview=res.wrong.length>0 && set.type!=='sentences' && set.type!=='review';
    return(
      <div className="fullscreen results anim-fade">
        {passed&&<Confetti/>}
        <h1 style={{fontSize:'3rem',color:'var(--navy)',marginBottom:10}}><PopText text={heading} active={passed}/></h1>
        <div className={`big-score ${passed?'pass':'fail'}${passed?' score-pop':''}`}>{score}%</div>
        <p className={`results-tier tier-${tier}${passed?' tier-fadein':''}`} dangerouslySetInnerHTML={{__html:subtitle}}/>
        {res.wrong.length>0&&<div style={{textAlign:'left',background:'var(--white)',borderRadius:20,padding:'40px',margin:'10px 0 30px',maxWidth:900,width:'100%',border:'4px solid var(--red-bright)'}}>
          <h3 style={{color:'var(--red-bright)',marginBottom:20,fontSize:'1.5rem'}}>Review these ({res.wrong.length}):</h3>
          {res.wrong.map((w,i)=><div key={i} style={{padding:'16px 0',borderBottom:'2px solid var(--lgrey)',fontSize:'1.3rem'}}><strong className={w.latin?'latin':''}>{w.latin||w.question}</strong> <span style={{color:'var(--grey)'}}>&rarr;</span> <span style={{color:'#1a73e8',fontWeight:700}}>{w.correct}</span></div>)}
        </div>}
        <div className={passed?'btns-drift':''} style={{display:'flex',gap:20,marginTop:20,flexWrap:'wrap',justifyContent:'center'}}>
          <button className="btn btn-primary" style={{fontSize:'1.3rem'}} onClick={()=>onFinish(score)}>Menu<span className="keyhint" style={{color:'white'}}>Esc</span></button>
          {showQuickReview&&<button className="btn btn-quick" style={{fontSize:'1.3rem'}} onClick={onPracticeWrongs}>Quick review<span className="keyhint" style={{color:'white'}}>Space</span></button>}
          {!passed&&<button className="btn btn-grey" style={{fontSize:'1.3rem'}} onClick={()=>onSaveAndNext(score,set)}>Retry set</button>}
          {passed&&nextN&&<button className="btn btn-green" style={{fontSize:'1.3rem'}} onClick={()=>onSaveAndNext(score,nextN)}>Next Set<span className="keyhint" style={{color:'white'}}>Enter</span></button>}
        </div>
      </div>
    );
  }
  // ── Quick Review done splash ──────────────────────────────────────────────────
  function QuickReviewDone({count,passed,score,set,onRetry,onMenu,onSaveAndNext}){
    const [nextN,setNextN]=useState(null);
    useEffect(()=>{
      if(passed) api('/api/sets').then(all=>{const idx=all.findIndex(x=>x.id===set.id);setNextN(idx>=0&&idx+1<all.length?all[idx+1]:null);});
    },[set.id,passed]);
    useEffect(()=>{
      const h=e=>{if(e.key==='Enter')onRetry();if(e.key==='Escape')onMenu();};
      window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
    },[onRetry,onMenu]);
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade">
          <div className="activity-body" style={{textAlign:'center',padding:'80px 20px'}}>
            <div style={{width:56,height:56,background:'var(--green-bright)',borderRadius:'50%',margin:'0 auto 20px',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{width:28,height:28}}><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h2 style={{color:'var(--navy)',fontSize:'2.5rem',marginBottom:12}}>Quick review done.</h2>
            <p style={{fontSize:'1.15rem',color:'var(--grey)',maxWidth:600,margin:'0 auto 12px',lineHeight:1.6}}>
              You drilled <strong>{count}</strong> {count===1?'item':'items'}.
            </p>
            <p style={{fontSize:'1.1rem',color:passed?'#16a34a':'var(--grey)',maxWidth:600,margin:'0 auto 40px',lineHeight:1.6,fontWeight:passed?700:400}}>
              {passed
                ? `You'd already passed with ${score}% — take the next set or go again for a higher score.`
                : 'You haven\'t passed yet — redo the whole set to earn your pass.'}
            </p>
            <div style={{display:'flex',gap:16,justifyContent:'center',flexWrap:'wrap'}}>
              <button className="btn btn-primary" onClick={onMenu} style={{fontSize:'1.2rem'}}>
                Menu<span className="keyhint" style={{color:'white'}}>Esc</span>
              </button>
              <button className="btn btn-grey" onClick={onRetry} style={{fontSize:'1.2rem'}}>
                Redo the whole set<span className="keyhint">Enter</span>
              </button>
              {passed&&nextN&&<button className="btn btn-green" onClick={()=>onSaveAndNext(score,nextN)} style={{fontSize:'1.2rem'}}>
                Next set →
              </button>}
            </div>
          </div>
        </div>
      </div>
    );
  }
  // ── Wrongs-only typed drill (server-marked for sentences, lenient for others) ─
  function WrongsPractice({wrongs,onDone,set,pupil}){
    const [idx,setIdx]=useState(0);
    const [val,setVal]=useState('');
    const [checked,setChecked]=useState(null); // null | {ok,message,correctAnswer}
    const [retyping,setRetyping]=useState(false);
    const inputRef=useRef(null);
    const w=wrongs[idx];
    const isSent=set&&(set.type==='sentences'||set.type==='review');

    useEffect(()=>{setVal('');setChecked(null);setRetyping(false);setTimeout(()=>inputRef.current?.focus(),50);},[idx]);

    const advance=()=>{setVal('');setChecked(null);setRetyping(false);if(idx+1<wrongs.length)setIdx(i=>i+1);else onDone();};

    const handleCheck=async()=>{
      if(retyping){
        const norm=s=>s.trim().toLowerCase().replace(/[.!?,;]+$/,'');
        if(norm(val)===norm(checked.correctAnswer))advance();
        return;
      }
      if(isSent){
        const res=await api('/api/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pupil_id:pupil?.id||0,set_id:set?.id||0,question_type:'sentence',question_text:w.latin||w.question,pupil_answer:val,correct_answer:w.correct})});
        if(res.counts_as_correct){advance();}
        else{setChecked({ok:false,message:res.message||`Correct: ${w.correct}`,correctAnswer:w.correct});setRetyping(true);setVal('');}
      } else {
        const norm=s=>(s||'').trim().toLowerCase();
        if(norm(val)===norm(w.correct)){advance();}
        else{setChecked({ok:false,message:`The answer is: ${w.correct}`,correctAnswer:w.correct});setRetyping(true);setVal('');}
      }
    };

    useEffect(()=>{
      const h=e=>{if((e.key==='Enter')&&e.target.tagName==='INPUT')handleCheck();};
      window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
    },[val,retyping,checked,idx]);

    if(!w)return null;
    const pct=((idx)/wrongs.length)*100;
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade">
          <div className="activity-bar"><ProgressBar pct={pct}/><span style={{fontWeight:700,color:'var(--grey)'}}>Quick review &middot; {idx+1} / {wrongs.length}</span></div>
          <div className="activity-body" style={{justifyContent:'center',padding:'40px 20px',paddingTop:36}}>
            <p style={{fontSize:'1rem',color:'var(--grey)',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',marginBottom:14}}>Quick review — retype these</p>
            <p style={{fontSize:'2rem',color:'var(--navy)',fontWeight:800,marginBottom:24}} className={w.latin?'latin':''}>{w.latin||w.question}</p>
            {checked&&!checked.ok&&<div style={{background:'#ffeaec',border:'3px solid var(--red-bright)',borderRadius:12,padding:'14px 20px',marginBottom:16,color:'#991b1b',fontWeight:700,fontSize:'1.1rem'}}>{checked.message}</div>}
            {retyping&&<p style={{color:'var(--grey)',marginBottom:8,fontWeight:600}}>Now type the correct answer to continue:</p>}
            <input ref={inputRef} autoFocus value={val} onChange={e=>setVal(e.target.value)}
              className="typed-input"
              style={{maxWidth:780,marginBottom:20,borderColor:checked&&!checked.ok?'var(--red-bright)':undefined}}
              placeholder={retyping?'Type the correct answer…':'Type your translation…'}/>
            <button className="btn btn-primary" onClick={handleCheck} style={{fontSize:'1.1rem'}}>
              {retyping?'Confirm':'Check'}<span className="keyhint" style={{color:'white'}}>Enter</span>
            </button>
            <p style={{marginTop:24,color:'var(--grey)',fontSize:'0.95rem'}}>After this, you can redo the whole set from the start.</p>
          </div>
        </div>
      </div>
    );
  }

  const root=ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App/>);
</script>
</body>
</html>
