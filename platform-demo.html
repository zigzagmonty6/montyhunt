                  {[['newest','Most recent'],['oldest','Furthest ago'],['set','By set']].map(([val,lbl])=>(
                    <button key={val} onClick={()=>setFeedbackSort(val)}
                      style={{padding:'6px 14px',background:feedbackSort===val?'var(--navy)':'#fff',color:feedbackSort===val?'#fff':'var(--navy)',border:'2px solid '+(feedbackSort===val?'var(--navy)':'var(--lgrey)'),borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:'0.85rem'}}>
                      {lbl}
                    </button>
                  ))}
                </div>
              </div>
              {feedbackMsgs.length===0&&<p style={{color:'var(--grey)'}}>No feedback yet.</p>}
              {[...feedbackMsgs].sort((a,b)=>{
                if(feedbackSort==='oldest')return new Date(a.created_at)-new Date(b.created_at);
                if(feedbackSort==='set')return (a.set_id||0)-(b.set_id||0)||new Date(b.created_at)-new Date(a.created_at);
                return new Date(b.created_at)-new Date(a.created_at); // newest
              }).map(m=><div key={m.id} onClick={()=>!m.read&&markRead(m.id)} style={{background:m.read?'#f8fafc':'#fff',border:'2px solid '+(m.read?'var(--lgrey)':'var(--navy)'),borderRadius:14,padding:'16px 20px',marginBottom:12,cursor:m.read?'default':'pointer'}}>
                <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:6}}>
                  <span style={{fontWeight:800,color:'var(--navy)'}}>{m.pupil_name||'Anonymous'}</span>
                  {m.set_title&&<span style={{background:'var(--lgrey)',borderRadius:6,padding:'2px 8px',fontSize:'0.8rem',fontWeight:700,color:'var(--grey)'}}>{m.set_title}</span>}
                  <span style={{marginLeft:'auto',fontSize:'0.8rem',color:'var(--grey)'}}>{m.created_at?.substring(0,16).replace('T',' ')}</span>
                  {!m.read&&<span style={{background:'var(--navy)',color:'#fff',borderRadius:6,padding:'2px 8px',fontSize:'0.75rem',fontWeight:700}}>NEW</span>}
                </div>
                <p style={{margin:0,color:'var(--dark)',fontSize:'1.05rem'}}>{m.note}</p>
              </div>)}
            </div>}

            {tab==='timing'&&<div style={{maxWidth:960}}>
              <h2 style={{fontSize:'1.8rem',marginBottom:6}}>Timing & Integrity</h2>
              <p style={{color:'var(--grey)',marginBottom:16,fontSize:'0.95rem'}}>Set completion times. <span style={{color:'var(--red-bright)',fontWeight:700}}>Red</span> = very fast (&lt;30s with passing score), <span style={{color:'#92400e',fontWeight:700}}>amber</span> = below expected minimum for set type.</p>
              <div style={{display:'flex',gap:12,marginBottom:20,alignItems:'center'}}>
                <label style={{display:'flex',gap:8,alignItems:'center',cursor:'pointer',fontWeight:600,fontSize:'0.9rem'}}>
                  <input type="checkbox" checked={timingFlagged} onChange={e=>setTimingFlagged(e.target.checked)} style={{width:16,height:16}}/>
                  Show flagged only ({timing.filter(t=>t.flag>0).length} entries)
                </label>
              </div>
              {timing.length===0&&<p style={{color:'var(--grey)',fontStyle:'italic'}}>No timing data yet — data is collected as pupils complete sets.</p>}
              {timing.length>0&&<table className="t-table"><thead><tr><th>Pupil</th><th>Set</th><th>Score</th><th>Time</th><th>Flag</th></tr></thead><tbody>
                {timing.filter(t=>!timingFlagged||t.flag>0).map((t,i)=>{
                  const flagEl=t.flag===2
                    ?<span style={{background:'#ffeaec',color:'var(--red-bright)',fontWeight:800,fontSize:'0.78rem',padding:'3px 8px',borderRadius:5}}>VERY FAST</span>
                    :t.flag===1
                    ?<span style={{background:'#fef3c7',color:'#92400e',fontWeight:800,fontSize:'0.78rem',padding:'3px 8px',borderRadius:5}}>FAST</span>
                    :<span style={{color:'var(--lgrey)',fontSize:'0.85rem'}}>—</span>;
                  const mins=Math.floor(t.time_seconds/60);
                  const secs=t.time_seconds%60;
                  const timeStr=mins>0?`${mins}m ${secs}s`:`${secs}s`;
                  return<tr key={i} style={{background:t.flag===2?'#fff5f5':t.flag===1?'#fffbeb':'inherit'}}>
                    <td style={{fontWeight:700}}>{t.pupil_name}</td>
                    <td style={{fontSize:'0.9rem'}}>{t.set_title}</td>
                    <td><strong style={{color:t.score>=80?'var(--green-bright)':'var(--gold)'}}>{t.score}%</strong></td>
                    <td style={{fontFamily:'monospace',fontWeight:600}}>{timeStr}</td>
                    <td>{flagEl}</td>
                  </tr>;
                })}
              </tbody></table>}
            </div>}

            {tab==='misconceptions'&&<div style={{maxWidth:900}}><h2 style={{fontSize:'1.8rem',marginBottom:20}}>Common Wrong Answers</h2>
              <table className="t-table"><thead><tr><th>Question</th><th>Wrote</th><th>Correct</th><th>Times</th></tr></thead><tbody>
                {misc.slice(0,20).map((r,i)=><tr key={i}><td>{r.question_text||r.question}</td><td className="latin" style={{color:'var(--red-bright)'}}>{r.pupil_answer||r.wrong_answer}</td><td className="latin" style={{color:'var(--green-bright)'}}>{r.correct_answer||r.correct}</td><td>{r.occurrences||r.count||r.n}</td></tr>)}
              </tbody></table></div>}

            <div>
              <p style={{fontSize:'1.2rem',color:'var(--grey)',marginBottom:20}}>Click any set to preview. Progress will not be saved.</p>
              {nodes.map(node=>(<div key={node.label}><div className="section-label">{node.label}</div>
                <div className="set-grid">{node.sets.map(s=>(<div key={s.id} className="set-card passed" onClick={()=>api(`/api/sets/${s.id}`).then(onStart)}>
                  <div className="tag-badge" style={{background:tagColorWithBadge(s.type,s.badge)}}>{tagLabelWithBadge(s.type,s.badge)}</div>
                  <h3 dangerouslySetInnerHTML={{__html:renderOrdinals(s.title)}}></h3>
                </div>))}</div></div>))}
            </div>

            {tab==='pupil'&&selPupil&&<div style={{maxWidth:900}}>
              <h2 style={{fontSize:'1.8rem',marginBottom:20}}>{selPupil.first_name||selPupil.name}</h2>
              <table className="t-table"><thead><tr><th>Set</th><th>Status</th><th>Best Score</th><th>Attempts</th></tr></thead><tbody>
                {detail.map((d,i)=>{const s=sets.find(s=>s.id===d.set_id);return <tr key={i}><td>{s?s.title:`Set ${d.set_id}`}</td><td>{d.status}</td><td>{d.best_score?Math.round(d.best_score)+'%':'-'}</td><td>{d.attempts}</td></tr>})}
              </tbody></table>
            </div>}

          </div>
        </div>
        {children}
      </div>
    );
  }

  // ── Front Overlay ─────────────────────────────────────────────────────────────
  function Front({set,onGo,onBack,onComplete}){
    const isOverlay = set.type==='reference'||set.type==='concept';
    const complete = onComplete||onBack;
    useEffect(()=>{const h=e=>{if(e.key==='Escape')onBack();if(e.key==='Enter'){isOverlay?complete():onGo()}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[onBack,onGo,isOverlay,complete]);
    
    // Check if the set content is screens-based (e.g. concept)
    const screens = set.screens||[];
    const [screenIdx,setScreenIdx] = useState(0);
    useEffect(()=>{document.querySelector('.modal-content')?.scrollTo({top:0,behavior:'instant'});},[screenIdx]);

    // If it's a concept, we act as an intro modal scrolling through screens. If standard reference or standard set, we just show the title/sell
    if (isOverlay && screens.length > 0) {
       const s = screens[screenIdx];
       return (
        <div className="modal-overlay anim-fade">
          <div className="modal-content" style={{textAlign:'left'}}>
            <h2 style={{fontSize:'2.5rem',color:'var(--navy)',marginBottom:24}} dangerouslySetInnerHTML={{__html:renderOrdinals(s.heading)}}></h2>
            {s.warning&&<div style={{background:'#ffeaec',border:'3px solid var(--red-bright)',borderRadius:12,padding:'16px 20px',marginBottom:16,fontWeight:700,color:'#991b1b'}}>{renderText(s.warning)}</div>}
            {s.body&&<p style={{fontSize:'1.3rem',color:'var(--grey)',lineHeight:1.5,marginBottom:20,textAlign:s.body_align||'left'}}>{renderTextWithKey(s.body)}</p>}
            {s.principal_parts_table&&<table className="pp-table" style={{marginBottom:16}}>
              <thead><tr><th>Principal Part</th><th>Name</th><th>Latin form</th><th>English meaning</th></tr></thead>
              <tbody>{s.principal_parts_table.map((r,i)=><tr key={i}><td style={{fontWeight:800}}>{r.part}</td><td>{r.name}</td><td className="lat-cell">{r.latin}</td><td style={{color:'var(--grey)'}}>{r.english}</td></tr>)}</tbody>
            </table>}
            {s.table&&<table className="conj-table">
              <thead><tr><th>Person & Number</th><th>Ending</th><th>Example</th></tr></thead>
              <tbody>{s.table.map((r,i)=><tr key={i}><td style={{fontWeight:800}}>{r.conjugation}</td><td><span className="latin">{r.infinitive_ending}</span></td><td>{r.ep?r.ep.map((p,pi)=><span key={pi} className="latin" style={{color:p[1]==='blue'?'var(--blue)':(p[1]==='coral'||p[1]==='red')?'var(--coral)':p[1]==='purple'?'#7C3AED':p[1]==='pink'?'#DB2777':(p[1]==='gold'||p[1]==='yellow')?'var(--gold)':p[1]==='green'?'#16a34a':'var(--dark)'}}>{p[0]}</span>):<span className="latin">{r.example}</span>}{r.tr&&<span style={{color:'var(--grey)',fontStyle:'italic',fontSize:'0.9em',marginLeft:6}}>({r.tr})</span>}</td></tr>)}</tbody>
            </table>}
            {s.table_note&&<p style={{marginTop:10,fontSize:'0.9rem',color:'var(--grey)',fontStyle:'italic'}}>{renderTextWithKey(s.table_note)}</p>}
            <div style={{marginTop:20,display:'flex',gap:24,justifyContent:'center'}}>
               {screenIdx>0&&<button className="btn btn-outline" onClick={()=>setScreenIdx(i=>i-1)}>Back</button>}
               {screenIdx<screens.length-1?<button className="btn btn-primary" autoFocus onClick={()=>setScreenIdx(i=>i+1)}>Next<span className="keyhint" style={{color:'white'}}>Enter</span></button>
                 :<button className="btn btn-primary" autoFocus onClick={complete}>Got it<span className="keyhint" style={{color:'white'}}>Esc</span></button>}
            </div>
          </div>
        </div>
       );
    }

    return(
      <div className={isOverlay?"modal-overlay anim-fade":"fullscreen"}>
        {!isOverlay&&<div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>}
        <div className={isOverlay?"modal-content":"front-page anim-fade"}>
          <div className={isOverlay?"":"front-box"}>
            <h2 style={{fontSize:isOverlay?'3.5rem':'3.5rem',marginBottom:24,color:'var(--navy)'}} dangerouslySetInnerHTML={{__html:renderOrdinals(set.title)}}></h2>
            <p style={{fontSize:'1.5rem',color:'var(--grey)',lineHeight:1.5,whiteSpace:'pre-line',marginBottom:40,textAlign:'center'}}>{renderText(set.sell)}</p>
            {set.footnote&&<p style={{color:'var(--lgrey)',fontSize:'0.9rem',marginTop:8,marginBottom:8,fontStyle:'italic'}}>{renderTextWithKey(set.footnote)}</p>}
            {set.pass_mark?<p style={{fontWeight:800,color:'var(--navy)',fontSize:'1.4rem'}}>Pass mark: {set.pass_mark}%</p>:null}
            <div style={{marginTop:60,display:'flex',gap:24,justifyContent:'center'}}>
              {isOverlay?<button className="btn btn-primary" autoFocus onClick={complete}>Got it<span className="keyhint" style={{color:'white'}}>Esc</span></button>
               :<>
                 <button className="btn btn-outline" onClick={onBack}>Back<span className="keyhint">Esc</span></button>
                 <button className="btn btn-primary" autoFocus onClick={onGo}>Begin<span className="keyhint" style={{color:'white'}}>Enter</span></button>
               </>}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Play router ───────────────────────────────────────────────────────────────
  function Play({pupil,set,isPreview,onFinish,onSaveAndNext,onBack}){
    const [phase,setPhase]=useState('init');
    const [targetPhase,setTargetPhase]=useState(null);
    const [confirmQuit,setConfirmQuit]=useState(false);
    const [res,setRes]=useState({correct:0,wrong:[]});
    const totalRef=useRef(0);
    const originalTargetRef=useRef(null);

    useEffect(()=>{
      document.querySelector('.activity-body')?.scrollTo({top:0,behavior:'instant'});
      let target = set.type;
      if(set.type==='vocab'||set.type==='verbs'){
        const n=set.verbs?(set.verbs||[]).length:(set.vocab||[]).length;
        totalRef.current=n*2;target='vocab_overview';
      }else if(set.type==='building_parts'){
        const verbs=(set.verbs||[]);const mode=set.mode;
        const countVerbs=mode==='ppps'?verbs.filter(v=>v.ppp!==null).length:verbs.length;
        if(mode==='all_four_from_present') totalRef.current=verbs.length;
        else if(mode==='all_four'){
          // MC phase: one question per verb; typed phase: one per gap per verb
          const gapPos=set.gap_positions||[2,3];
          const typedCount=verbs.reduce((acc,v)=>{
            const parts=[v.present,v.infinitive,v.perfect,v.ppp];
            return acc+gapPos.filter(g=>parts[g]!=null).length;
          },0);
          totalRef.current=verbs.length + typedCount;
        }
        else if(mode==='all_four_progressive'){
          // phase1: all verbs (gap=perfect), phase2: PPP-having verbs (gap=PPP), phase3: all verbs (all_four_from_present)
          const pppCount=verbs.filter(v=>v.ppp!==null).length;
          totalRef.current=verbs.length + pppCount + verbs.length;
        }
        else totalRef.current=countVerbs*2; // MC phase + typed phase each count
        target=(mode==='all_four_from_present'||mode==='all_four_progressive')?'bp_typed':'bp_pattern';
      }else if(set.type==='tense_id'){totalRef.current=(set.questions||[]).length;target='tense_id';
      }else if(set.type==='parsing'){totalRef.current=(set.questions||[]).length;target='parsing';
      }else if(set.type==='parsing_mcq'){totalRef.current=(set.questions||[]).length;target='parsing_mcq';
      }else if(set.type==='translate_form'){totalRef.current=(set.questions||[]).length*2;target='translate_form';
      }else if(set.type==='sentences'){totalRef.current=(set.sentences||[]).length;target='sentences';
      }else if(set.type==='review'){
        const sCount=(set.sentences||[]).length;
        const ptCount=(set.parse_translate||[]).length;
        totalRef.current=sCount+ptCount;target='parse_translate';
      }else if(set.type==='verb_conjugation'){
        // FC (no marks) → MC (1 per verb) → Typed (part + meaning = 2 per verb)
        totalRef.current=(set.verbs||[]).length*3;target='verb_conj_fc';
      }else if(set.type==='intro'||set.type==='reference'||set.type==='concept'){totalRef.current=1;target='intro';}
      
      originalTargetRef.current=target;
      if(set.screens && set.screens.length>0 && target!=='intro'){
        setTargetPhase(target);
        setPhase('intro');
      }else{
        setPhase(target);
      }
    },[]);

    useEffect(()=>{
      if(phase==='results')return;
      const h=e=>{
        if(e.key==='Escape'){if(showPlayLB){setShowPlayLB(false);}else{setConfirmQuit(q=>!q);}}
        if(e.ctrlKey && e.altKey && e.code==="KeyS"){totalRef.current=1;setRes({correct:1,wrong:[]});setPhase('results')}
      };
      window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
    },[phase]);

    const [streak,setStreak]=useState(0);
    const addC=()=>{setRes(p=>({...p,correct:p.correct+1}));setStreak(s=>s+1)};
    const addW=w=>{setRes(p=>({...p,wrong:[...p.wrong,w]}));setStreak(0)};
    const wrongCount=res.wrong.length;
    const HELP_TIPS={
      vocab_fc:<><strong>Flashcard practice.</strong> No marks, just exposure. Press <strong>SPACE</strong> to flip the card. Press <strong>1</strong> if you found it hard, <strong>2</strong> if you got it. Hard cards come back more often before the set ends.</>,
      vocab_mc:<><strong>Multiple choice.</strong> Pick the right English meaning from four options using keys <strong>1&ndash;4</strong>, then press <strong>Enter</strong> to confirm. There is a 10-second timer per question; if it runs out the question is marked wrong.</>,
      vocab_typed:<><strong>Type the English translation</strong> of the Latin word and press <strong>Enter</strong>. If you get it wrong, you'll see an explanation and have to type the correct answer once before you can continue.</>,
      bp_fc:<><strong>Principal-parts flashcard.</strong> Press <strong>SPACE</strong> to reveal all four parts. Press <strong>1</strong> for hard, <strong>2</strong> if you knew it.</>,
      bp_mc:<><strong>Multiple choice.</strong> Pick the correct principal part from the four options. Use keys <strong>1&ndash;4</strong> to select, then press <strong>Enter</strong> to continue.</>,
      bp_typed:<><strong>Type the missing principal part</strong> for each verb and press <strong>Enter</strong>. Wrong answers will be re-shown with the correct form before you continue.</>,
      tense_id:<><strong>Identify the tense</strong> of the Latin verb form shown. Use the keys <strong>1&ndash;4</strong> or click. Wrong answers explain which tense marker gives the form away.</>,
      parsing:<><strong>Full parse:</strong> identify person/number, then tense — each step marked individually.</>,
      parsing_mcq:<><strong>Pick the correct parse</strong> of the Latin verb from the multiple-choice options.</>,
      translate_form:<><strong>Latin verb form &rarr; English.</strong> You'll be shown a single Latin verb form (e.g. <em>amabamus</em>) and asked to choose its person, then tense, then English translation in three steps. Used in tense-practice sets.</>,
      tf_typed:<><strong>Type the English</strong> for the Latin verb form shown, then press <strong>Enter</strong>. Wrong answers must be retyped correctly before you can continue.</>,
      sentences:<><strong>Translate the whole sentence.</strong> Press <strong>Enter</strong> to check your answer. If you get it wrong, you'll see an explanation of the grammar and have to type the correct answer before continuing.</>,
      parse_translate:<><strong>Parse one verb, then translate the sentence.</strong> Two steps per question; each is marked separately.</>,
      bp_pattern:<><strong>Pattern-match principal parts.</strong> Match each Latin form to the principal-part position it belongs in.</>,
      vocab_overview:<><strong>Set overview.</strong> Have a quick look at every word in the set, then press <strong>Enter</strong> to begin.</>,
      verb_conj_fc:<><strong>Flashcard — principal parts.</strong> Press <strong>SPACE</strong> to reveal all four principal parts. Press <strong>1</strong> if you found it hard, <strong>2</strong> if you knew it. Hard cards come back before the set ends.</>,
      verb_conj_mc:<><strong>Multiple choice — meanings.</strong> All four principal parts are shown. Pick the correct English meaning from the four options using keys <strong>1–4</strong>, then press <strong>Enter</strong>.</>,
      verb_conj:<><strong>Principal parts drill.</strong> Each question shows a verb with one part blanked. Type the missing principal part in the left box, and the English meaning in the right box. Press <strong>Tab</strong> to switch between boxes, <strong>Enter</strong> to check.</>,
      intro:<><strong>Rule explanation.</strong> Read the grammar carefully. You'll be tested on it next. Press <strong>Enter</strong> to advance.</>,
    };
    const tip=HELP_TIPS[phase];
    const [showRule,setShowRule]=useState(false);
    const [showPlayLB,setShowPlayLB]=useState(false);
    const [playLBData,setPlayLBData]=useState([]);
    const openPlayLB=()=>{api('/api/leaderboard').then(setPlayLBData);setShowPlayLB(true);};
    // Hint-chip flash: pulse the ? button on the first two sets of any node
    // so first-time pupils notice it. Stops once the pupil hovers/clicks it.
    const [hintSeen,setHintSeen]=useState(()=>!!localStorage.getItem('hintSeen'));
    const flashHint = !hintSeen && set && (set.id<=2 || set.id===21 || set.id===37);
    const [autoTip,setAutoTip]=useState(false);
    useEffect(()=>{
      if(flashHint){setAutoTip(true);const t=setTimeout(()=>setAutoTip(false),4000);return()=>{clearTimeout(t);setAutoTip(false);};}
    },[flashHint]);
    const ruleCard=set.rule_card;
    const pct=totalRef.current>0?Math.min(100,(res.correct/totalRef.current)*100):0;
    const done=()=>setPhase('results');

    // Stable shuffled arrays - only computed once
    const vocabItems=useRef(shuffleOnce(set.vocab
      ? (set.vocab||[]).map(v=>({...v, dative_note: v.dative_note || DATIVE_VERBS.has(v.latin)}))
      : (set.verbs||[]).map(v=>({latin:v.present,english:[v.eng_present],pos:'verb',id:v.present,dative_note:DATIVE_VERBS.has(v.present),...(v.derivatives?{derivatives:v.derivatives}:{})}))
    ));
    const vocabItemsTyped=useRef(shuffleOnce(set.vocab
      ? (set.vocab||[]).map(v=>({...v, dative_note: v.dative_note || DATIVE_VERBS.has(v.latin)}))
      : (set.verbs||[]).map(v=>({latin:v.present,english:[v.eng_present],pos:'verb',id:v.present,dative_note:DATIVE_VERBS.has(v.present),...(v.derivatives?{derivatives:v.derivatives}:{})}))
    ));
    const bpVerbs=useRef(shuffleOnce([...(set.verbs||[])]));
    const vcVerbs=useRef(shuffleOnce([...(set.verbs||[])]));
    const tenseQs=useRef([...(set.questions||[])]);  // server shuffles already
    const parsingQs=useRef([...(set.questions||[])]);
    const sentences=useRef([...(set.sentences||[])]);
    const tfTypedQs=useRef(shuffleOnce([...(set.questions||[])]));
    const parseTrQs=useRef([...(set.parse_translate||[])]);

    let content=null;
    if(phase==='intro') content=<Intro set={set} screens={set.screens||[]} isPreview={isPreview} pupil={pupil} onDone={()=>targetPhase?setPhase(targetPhase):done()} pct={pct}/>;
    else if(phase==='vocab_overview') content=<VocabOverview set={set} items={set.vocab||set.verbs||[]} onDone={()=>setPhase('vocab_fc')}/>;
    else if(phase==='vocab_fc') content=<VocabFC pupil={pupil} set={set} items={vocabItems.current} isPreview={isPreview} onDone={()=>setPhase('vocab_mc')} pct={pct}/>;
    else if(phase==='vocab_mc') content=<VocabMC pupil={pupil} set={set} items={vocabItems.current} isPreview={isPreview} onDone={()=>setPhase('vocab_typed')} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='vocab_typed') content=<VocabTyped pupil={pupil} set={set} items={vocabItemsTyped.current} isPreview={isPreview} onDone={done} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='bp_pattern') content=<BPPattern set={set} onDone={()=>setPhase('bp_fc')}/>;
    else if(phase==='bp_fc') content=<BPFC pupil={pupil} set={set} verbs={bpVerbs.current} isPreview={isPreview} onDone={()=>setPhase('bp_mc')} pct={pct}/>;
    else if(phase==='bp_mc') content=<BPMC pupil={pupil} set={set} verbs={bpVerbs.current} isPreview={isPreview} onDone={()=>setPhase('bp_typed')} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='bp_typed') content=<BPTyped pupil={pupil} set={set} verbs={bpVerbs.current} isPreview={isPreview} onDone={done} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='tense_id') content=<TenseId pupil={pupil} set={set} qs={tenseQs.current} isPreview={isPreview} onDone={done} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='parsing') content=<FullParsing pupil={pupil} set={set} qs={parsingQs.current} isPreview={isPreview} onDone={done} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='parsing_mcq') content=<Parsing pupil={pupil} set={set} qs={set.questions||[]} isPreview={isPreview} onDone={done} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='translate_form') content=<TranslateForm pupil={pupil} set={set} qs={set.questions||[]} isPreview={isPreview} onDone={()=>setPhase('tf_typed')} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='tf_typed') content=<TFTyped pupil={pupil} set={set} qs={tfTypedQs.current} isPreview={isPreview} onDone={done} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='sentences') content=<Sentences pupil={pupil} set={set} qs={sentences.current} isPreview={isPreview} onDone={done} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='parse_translate') content=<ParseAndTranslate pupil={pupil} set={set} qs={parseTrQs.current} isPreview={isPreview} onDone={set.type==='review'?()=>setPhase('sentences'):done} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='verb_conj_fc') content=<VerbConjFC pupil={pupil} set={set} verbs={vcVerbs.current} isPreview={isPreview} onDone={()=>setPhase('verb_conj_mc')} pct={pct}/>;
    else if(phase==='verb_conj_mc') content=<VerbConjMC pupil={pupil} set={set} verbs={vcVerbs.current} isPreview={isPreview} onDone={()=>setPhase('verb_conj')} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='verb_conj') content=<VerbConj pupil={pupil} set={set} verbs={vcVerbs.current} isPreview={isPreview} onDone={done} addC={addC} addW={addW} pct={pct}/>;
    // Quick Review: filter the original vocab items to those the pupil missed,
    // then re-run the full FC → MC → Typed cycle on just that subset, then
    // show a done screen with options to move on or redo the whole set.
    const wrongLatinSet = useRef(new Set());
    const qrItems = useRef([]);
    const preQrPassed = useRef(false);
    const preQrScore = useRef(0);
    const startQuickReview = ()=>{
      // Capture pass state before we reset res.
      const s = totalRef.current>0 ? Math.min(100,Math.round((res.correct/totalRef.current)*100)) : 100;
      preQrScore.current = s;
      preQrPassed.current = s >= (set.pass_mark||80);
      // Build the wrong-item set from res.wrong, dedup'd.
      const lats = new Set(res.wrong.map(w=>w.latin).filter(Boolean));
      wrongLatinSet.current = lats;
      // Filter from original vocabItems so we keep full item shape (english array, dative_note, etc.)
      const pool = vocabItems.current;
      qrItems.current = pool.filter(v=>lats.has(v.latin));
      if(qrItems.current.length===0){ setRes({correct:0,wrong:[]}); setStreak(0); setPhase(originalTargetRef.current||set.type); return; }
      saveProgress(s); // save before wiping res so score is always persisted
      setRes({correct:0,wrong:[]}); setStreak(0); setPhase('qr_typed');
    };
    if(phase==='qr_typed') content=<VocabTyped pupil={pupil} set={set} items={qrItems.current} isPreview={isPreview} onDone={()=>setPhase('qr_done')} addC={addC} addW={addW} pct={pct}/>;
    else if(phase==='qr_done') content=<QuickReviewDone
      count={qrItems.current.length}
      passed={preQrPassed.current}
      score={preQrScore.current}
      set={set}
      onRetry={()=>{setRes({correct:0,wrong:[]});setStreak(0);setPhase(originalTargetRef.current||set.type);}}
      onMenu={()=>onFinish(preQrScore.current)}
      onSaveAndNext={onSaveAndNext}
    />;
    else if(phase==='wrongs_practice') content=<WrongsPractice wrongs={res.wrong} onDone={()=>onFinish(preQrScore.current)} set={set} pupil={pupil}/>;
    else if(phase==='results') content=<Results res={res} set={set} total={totalRef.current} onFinish={onFinish} onSaveAndNext={onSaveAndNext} onPracticeWrongs={set.type==='vocab'||set.type==='verbs'?startQuickReview:()=>{const s=totalRef.current>0?Math.min(100,Math.round((res.correct/totalRef.current)*100)):100;preQrScore.current=s;preQrPassed.current=s>=(set.pass_mark||80);saveProgress(s);setPhase('wrongs_practice');}}/>;

    const showStreak=['sentences','review'].includes(set.type)?0:streak;
    return(<StreakCtx.Provider value={showStreak}>
      {content}
      {phase!=='results'&&phase!=='wrongs_practice'&&phase!=='qr_done'&&<div style={{position:'fixed',top:24,right:40,zIndex:50,display:'flex',gap:10,alignItems:'center'}}>
        {wrongCount>0&&<span className="play-chip queue" title="Items you've missed in this set so far"><strong>{wrongCount}</strong> to review</span>}
        {ruleCard&&<button className="play-chip" onClick={()=>setShowRule(true)} style={{cursor:'pointer'}}>Show the rule</button>}
        {tip&&<span className="help-wrap" onMouseEnter={()=>{if(!hintSeen){localStorage.setItem('hintSeen','1');setHintSeen(true);}}}><button className={`help-chip${flashHint?' flash':''}`} aria-label="Help">?</button><div className={`help-tip${autoTip?' open':''}`}>{tip}</div></span>}
        {!isPreview&&<button onClick={openPlayLB} className="play-chip" style={{cursor:'pointer'}}>Leaderboard</button>}
        <button onClick={()=>setConfirmQuit(true)} className="play-chip" style={{cursor:'pointer'}}>Menu</button>
      </div>}
      {showRule&&ruleCard&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setShowRule(false)}>
        <div className="anim-fade" onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:20,padding:'40px 50px',maxWidth:680,width:'92%',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
          <h3 style={{color:'var(--navy)',marginBottom:16,fontSize:'1.5rem'}}>{ruleCard.title||'The rule'}</h3>
          <div style={{fontSize:'1.1rem',lineHeight:1.55,color:'var(--dark)'}}>{renderText(ruleCard.body||'')}</div>
          <div style={{marginTop:24,textAlign:'right'}}><button className="btn btn-primary" onClick={()=>setShowRule(false)}>Got it<span className="keyhint" style={{color:'white'}}>Esc</span></button></div>
        </div>
      </div>}
      {confirmQuit&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div className="anim-fade" style={{background:'white',borderRadius:20,padding:'60px 80px',maxWidth:520,width:'90%',textAlign:'center',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
          <p style={{fontSize:'1.3rem',fontWeight:800,color:'var(--navy)',marginBottom:10}}>Leave this set?</p>
          <p style={{color:'var(--grey)',marginBottom:40}}>Your progress won't be saved.</p>
          <div style={{display:'flex',gap:32,justifyContent:'center'}}>
            <button className="btn btn-outline" onClick={()=>setConfirmQuit(false)}>Keep going<span className="keyhint">Esc</span></button>
            <button className="btn btn-primary" onClick={onBack}>Leave<span className="keyhint" style={{color:'white'}}>→ Menu</span></button>
          </div>
        </div>
      </div>}
      {showPlayLB&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={e=>e.target===e.currentTarget&&setShowPlayLB(false)}>
        <div className="anim-fade" style={{background:'white',borderRadius:20,padding:'40px 40px 32px',maxWidth:560,width:'92%',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
          <h2 style={{fontSize:'2rem',color:'var(--navy)',marginBottom:4}}>Leaderboard</h2>
          <p style={{color:'var(--grey)',marginBottom:20,fontSize:'0.9rem'}}>XP = sum of best scores across all completed sets.</p>

            {playLBData.map((p)=><LBRow key={p.pupil_id} p={p} isMe={pupil&&p.pupil_id===pupil.id}/>)}
          </div>
          <div style={{marginTop:24,textAlign:'center'}}>
            <button className="btn btn-primary" onClick={()=>setShowPlayLB(false)}>Close<span className="keyhint" style={{color:'white'}}>Esc</span></button>
          </div>
        </div>
      </div>}
    </StreakCtx.Provider>);
  }

  // ── Vocab Overview ─────────────────────────────────────────────────────────────
  function VocabOverview({set,items,onDone}){
    useEffect(()=>{resetScroll();},[]);
    useEffect(()=>{const h=e=>{if(e.key==='Enter')onDone()};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[onDone]);

            <div className="vocab-overview" style={{marginTop:0,marginBottom:0}}>{renderChips(grouped[pos]||[])}</div>
          </div>):<div className="vocab-overview">{renderChips(ungrouped)}</div>}
          <button className="btn btn-primary" autoFocus onClick={onDone} style={{marginTop:10}}>Begin<span className="keyhint" style={{color:'white'}}>Enter</span></button>

  // ── Vocab FC (flashcard - Press 1 Hard, Press 2 Got it) ───────────────────────
  function VocabFC({pupil,set,items,isPreview,onDone,pct}){
    const [queue,setQueue]=useState(()=>[...items]);
    const [idx,setIdx]=useState(0);const [rev,setRev]=useState(false);const [busy,setBusy]=useState(false);
    const [doneCount,setDoneCount]=useState(0);
    const [showDerivatives,setShowDerivatives]=useState(false);
    const [exitCls,setExitCls]=useState('');const [entering,setEntering]=useState(false);
    const cardTimesRef=useRef([]);const cardStartRef=useRef(Date.now());
    const [autoplay,setAutoplay]=useState(true);
    const synthRef=useRef(window.speechSynthesis||null);
    // preprocess text: "/" → " or ", clean up for natural TTS reading
    // ttsClean: convert slashes and commas-between-meanings to "or" for natural speech
    const ttsClean=t=>{
      if(!t)return'';
      return t.replace(/\s*\/\s*/g,' or ').replace(/,\s+/g,' or ').replace(/\s+/g,' ').trim();
    };
    const speak=(text,isLatin)=>{
      const synth=synthRef.current;if(!synth)return;
      synth.cancel();
      const utt=new SpeechSynthesisUtterance('');
      const voices=synth.getVoices();
      if(isLatin){
        // Classical Latin: hard-g fix — Spanish voice reads 'ge'/'gi' as soft-g (wrong for Latin).
        // Replace ge→gue, gi→gui so Spanish TTS produces the correct hard-g sound.
        const latText=ttsClean(text).replace(/g([ei])/gi,(m,v2)=>'gu'+v2);
        utt.text=latText;
        const v=voices.find(v=>v.lang.startsWith('la'))||voices.find(v=>v.lang.startsWith('es'))||voices.find(v=>v.lang.startsWith('it'))||null;
        if(v)utt.voice=v;utt.lang=v?v.lang:'es-ES';utt.rate=0.75;
      } else {
        utt.text=ttsClean(text);
        // Prefer natural UK human voices (Daniel/Serena/Oliver on macOS; Microsoft Hazel on Windows)
        const v=voices.find(v=>v.name==='Daniel')||voices.find(v=>v.name==='Serena')||
                voices.find(v=>v.name==='Oliver')||voices.find(v=>/hazel/i.test(v.name)&&v.lang.startsWith('en-GB'))||
                voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en-GB'))||
                voices.find(v=>v.lang.startsWith('en'))||null;
        if(v)utt.voice=v;utt.lang='en-GB';utt.rate=0.82;utt.pitch=1.05;
      }
      synth.speak(utt);
    };
    useEffect(()=>{cardStartRef.current=Date.now();},[idx]);
    // Autoplay Latin when card changes; hide derivatives panel
    useEffect(()=>{setShowDerivatives(false);if(autoplay&&queue[idx])speak(queue[idx].latin,true);},[idx,autoplay]);
    // Autoplay English when flipped
    useEffect(()=>{if(autoplay&&rev&&queue[idx]){const t=setTimeout(()=>speak(queue[idx].english.join(', '),false),250);return()=>clearTimeout(t);}},[rev]);
    // Stop speech on unmount
    useEffect(()=>()=>{synthRef.current&&synthRef.current.cancel();},[]);
    const rate=async r=>{
      if(busy)return;setBusy(true);
      const currentQ=queue[idx];
      cardTimesRef.current.push(Date.now()-cardStartRef.current);
      if(!isPreview)await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'flashcard_rating',question_text:currentQ.latin,pupil_answer:r});
      setExitCls(r==='got_it'?'fc-exit-right':'fc-exit-left');
      if(r==='again'){
        const newQueue=[...queue,{...currentQ,revisit:true}];
        setQueue(newQueue);
        setTimeout(()=>{
          setExitCls('');setRev(false);setBusy(false);
          if(idx+1>=newQueue.length)onDone();
          else{setIdx(i=>i+1);setEntering(true);setTimeout(()=>setEntering(false),230);}
        },270);
      } else {
        setDoneCount(d=>d+1);
        setTimeout(()=>{
          setExitCls('');setRev(false);setBusy(false);
          if(idx+1>=queue.length)onDone();
          else{setIdx(i=>i+1);setEntering(true);setTimeout(()=>setEntering(false),230);}
        },270);
      }
    };
    const q=queue[idx];
    const goBack=()=>{if(idx>0){setIdx(i=>i-1);setRev(false);}};
    useEffect(()=>{const h=e=>{
      if(e.code==='Space'){e.preventDefault();if(!rev)setRev(true);else rate('got_it');return;}
      if(rev&&e.key==='1')rate('again');
      if(rev&&e.key==='2')rate('got_it');
      if((e.ctrlKey||e.metaKey)&&e.key==='z'&&idx>0){e.preventDefault();goBack();}
    };window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)});
    const remaining=queue.slice(idx+1);
    const freshInQueue=queue.slice(idx).filter(c=>!c.revisit).length;
    const hardInQueue=remaining.filter(c=>c.revisit).length;
    const n=cardTimesRef.current.length;
    const avgMs=n>=5?cardTimesRef.current.reduce((a,b)=>a+b,0)/n:0;
    const estMs=avgMs>0?remaining.length*avgMs:0;
    const estLabel=avgMs>0?(estMs>=60000?`~${Math.round(estMs/60000)} min left`:`~${Math.round(estMs/1000)}s left`):null;

                  }

  function VocabMC({pupil,set,items,isPreview,onDone,addC,addW,pct,distractorPool}){
    const [queue,setQueue]=useState(()=>[...items]);
    const [qIdx,setQIdx]=useState(0);
    const [sel,setSel]=useState(null);const [fb,setFb]=useState(null);const [busy,setBusy]=useState(false);
    const [timeLeft,setTimeLeft]=useState(10);
    const q=queue[qIdx];
    const ansText = q?.english.join(', ')||'';
    // Distractor pool defaults to the items being quizzed; for Quick review we pass
    // the FULL vocab list so MCQ options always have 4 plausible choices.
    const pool = distractorPool && distractorPool.length>=4 ? distractorPool : items;
    // Compute options once per question, locked in ref
    const optsRef=useRef(null);
    if(optsRef.current===null||optsRef.current.qIdx!==qIdx){
      const otherItems=shuffleOnce(pool.filter(it=>it!==q&&(it.english||[]).join(', ')!==ansText));
      const uniqueOthers=[];
      for(const it of otherItems){const txt=it.english.join(', ');if(txt!==ansText&&!uniqueOthers.includes(txt)&&uniqueOthers.length<3)uniqueOthers.push(txt);}
      optsRef.current={qIdx,opts:shuffleOnce([ansText,...uniqueOthers])};
    }
    const opts=optsRef.current.opts;

    useEffect(()=>{
      if(fb||busy)return;
      if(timeLeft<=0){
        const handleTimeout=async()=>{
          setBusy(true);setSel('timeout');
          const chkRes=!isPreview?await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'mc',question_text:q.id||q.latin,pupil_answer:'TIMEOUT',correct_answer:ansText}):null;
          const res={counts_as_correct:false,timeout:true,message:`${timeoutBadge()} The correct answer is: **${chkRes?.correct_answer||ansText}**`};
          setFb(res);
          if(!q.failed){addW({latin:q.latin,correct:chkRes?.correct_answer||ansText});setQueue(prev=>[...prev,{...q,failed:true}]);}
          setBusy(false);
        };handleTimeout();return;
      }
      const t=setInterval(()=>setTimeLeft(x=>x-1),1000);return()=>clearInterval(t);
    },[timeLeft,fb,busy]);

    const pick=async o=>{
      if(fb||busy)return;setBusy(true);setSel(o);
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'mc',question_text:q.id||q.latin,pupil_answer:o,correct_answer:ansText});
      setFb(res);
      if(res.counts_as_correct){if(!q.failed)addC()}
      else{if(!q.failed){addW({latin:q.latin,correct:res.correct_answer||ansText});setQueue(prev=>[...prev,{...q,failed:true}]);}}
      setBusy(false);
    };
    const nx=()=>{resetScroll();optsRef.current=null;setFb(null);setSel(null);setTimeLeft(10);if(qIdx+1>=queue.length)onDone();else setQIdx(i=>i+1)};
    useEffect(()=>{const h=e=>{if(e.ctrlKey&&e.altKey&&e.code==="KeyK"){e.preventDefault();e.stopPropagation();if(!q?.failed)addC();nx();return;}if(e.ctrlKey&&e.altKey&&e.code==="KeyJ"){e.preventDefault();e.stopPropagation();nx();return;}if(fb&&(e.key==='Enter'||(e.code==='Space'&&e.target.tagName!=='INPUT'))){e.preventDefault();nx();}if(!fb){const n=parseInt(e.key);if(n>=1&&n<=4&&opts[n-1])pick(opts[n-1])}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)});
    if(!q)return null;
    const isRetry=q.failed;
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade">
          <div className="activity-bar"><ProgressBar pct={pct}/></div>
          <div style={{padding:'12px 40px 4px',width:'100%',maxWidth:1000,alignSelf:'center',boxSizing:'border-box'}}>
            <div className="timer-bar" style={{margin:0}}><div className="timer-fill" style={{width:`${(timeLeft/10)*100}%`,background:fb?(fb.counts_as_correct?'var(--green-bright)':'var(--red-bright)'):(timeLeft<=3?'var(--red-bright)':'var(--blue)'),transition:fb?'none':'width 1s linear, background .3s'}}></div></div>
          </div>
        <div className="activity-body" style={{overflowY:'hidden',justifyContent:'center',paddingTop:36}}>
          <div style={{minHeight:40,display:'flex',justifyContent:'center',alignItems:'center',marginBottom:8}}>
            {isRetry&&<div className="anim-fade" style={{background:'#f97316',border:'2px solid #ea580c',borderRadius:10,padding:'6px 16px',fontWeight:800,color:'white',fontSize:'0.9rem',display:'inline-block'}}>Try this again — you got it wrong before.</div>}
            {fb?.timeout&&<div className="anim-fade" style={{background:'var(--red-bright)',border:'2px solid #b91c1c',borderRadius:10,padding:'6px 16px',fontWeight:800,color:'white',fontSize:'0.9rem',display:'inline-block'}}>{timeoutBadge()}</div>}
          </div>
          <div className="mc-prompt"><h2 style={{display:'flex',justifyContent:'center',alignItems:'center',gap:12}}>What does {renderVocabLatin(q)} mean?</h2></div>
          <div className="mc-options">{opts.map((o,i)=><button key={i} className={`mc-opt ${fb?(o===ansText?'correct':o===sel?'wrong':''):''}`} disabled={busy&&!fb} onClick={()=>pick(o)}><span className="keyhint" style={{display:'block',marginBottom:12}}>Press {i+1}</span>{o}</button>)}</div>
          {fb&&<div className="anim-fade" style={{minHeight:80,display:'flex',flexDirection:'column',alignItems:'center'}}>
            <button className="btn btn-primary" disabled={busy} onClick={nx} style={{marginTop:16}}>Next<span className="keyhint" style={{color:'white'}}>Enter / Space</span></button>
          </div>}
          {!fb&&<div style={{minHeight:80}}></div>}
        </div></div>
      </div>
    );
  }

  // ── Typed base (reused for vocab and building_parts typed) ────────────────────
  function TypedBase({pupil,set,items,getPromptTop,getKey,getPromptSub,getSubStyle,getCorrect,isLatin,isPreview,onDone,addC,addW,pct}){
    const [queue,setQueue]=useState(()=>[...items]);
    const [qIdx,setQIdx]=useState(0);
    const [ans,setAns]=useState('');const [fb,setFb]=useState(null);
    const [retype,setRetype]=useState(false);const [rtAns,setRtAns]=useState('');const [rtFb,setRtFb]=useState(null);
    const [busy,setBusy]=useState(false);const inRef=useRef();const rtRef=useRef();
    const q=queue[qIdx];
    const correct=q?getCorrect(q):'';
    useEffect(()=>{if(!fb)inRef.current?.focus();if(retype)rtRef.current?.focus()},[qIdx,fb,retype]);
    const qtype=isLatin?'latin_typed':'vocab';
    const getKeyFn = getKey || getPromptTop;
    const submit=async()=>{
      if(busy||!q)return;setBusy(true);
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:qtype,question_text:getKeyFn(q),pupil_answer:ans,correct_answer:correct});
      setFb(res);
      if(res.counts_as_correct){if(!q.failed)addC()}
      else{
        if(!q.failed)addW({latin:getPromptTop(q),correct:res.correct_answer||correct});
        setQueue(prev=>[...prev,{...q,failed:true}]);
        setRetype(true);
      }
      setBusy(false);
    };
    const rtSubmit=async()=>{
      if(busy)return;
      if(!rtAns.trim()){setRtFb('Type your answer first.');return;}
      setBusy(true);
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:qtype,question_text:getKeyFn(q),pupil_answer:rtAns,correct_answer:correct});
      if(res.counts_as_correct)nx();else setRtFb('Not quite. Try again.');
      setBusy(false);
    };
    const nx=()=>{resetScroll();setAns('');setFb(null);setRetype(false);setRtAns('');setRtFb(null);if(qIdx+1>=queue.length)onDone();else setQIdx(i=>i+1)};
    useEffect(()=>{const h=e=>{if(e.ctrlKey&&e.altKey&&e.code==="KeyK"){e.preventDefault();e.stopPropagation();if(!q?.failed)addC();nx();return;}if(e.ctrlKey&&e.altKey&&e.code==="KeyJ"){e.preventDefault();e.stopPropagation();nx();return;}if(e.key==='Enter'){if(retype)rtSubmit();else if(fb&&!retype)nx();else if(!fb)submit()}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)});
    const inputStyle=isLatin?{fontFamily:'Crimson Text, serif',fontStyle:'italic',fontSize:'2.2rem'}:{};
    const isRetry=q?.failed;
    if(!q)return null;
    return(
      <div className="fullscreen"><div className="topbar"><h1 style={{fontFamily:'Crimson Text,serif',fontSize:'1.4rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600}}>Principal Parts Platform</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><ProgressBar pct={pct}/></div>
        <div className="activity-body">
          <div style={{minHeight:40,display:'flex',justifyContent:'center',alignItems:'center',marginBottom:8}}>
            {isRetry&&<div className="anim-fade" style={{background:'#f97316',border:'2px solid #ea580c',borderRadius:10,padding:'6px 16px',fontWeight:800,color:'white',fontSize:'0.9rem',display:'inline-block'}}>Try this again — you got it wrong before.</div>}
          </div>
          {isLatin
            ?<h1 className="latin dynamic-latin" style={{fontSize:String(getPromptTop(q)).length>15?'3rem':'4.5rem'}}>{getPromptTop(q)}</h1>
            :<div style={{marginBottom:8,textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center'}}><span style={{fontSize:String(q.latin||'').length>12?'3rem':'4.5rem',fontFamily:'Crimson Text,serif',fontStyle:'italic',fontWeight:700,color:'var(--dark)'}}>{q.latin}</span>{q.display_label&&(q.pos==='pronoun'?<span style={{fontSize:'0.75rem',color:'#0D9488',fontWeight:800,fontStyle:'normal',marginTop:6,letterSpacing:'0.06em',textTransform:'uppercase'}}>({q.display_label.toUpperCase()})</span>:<span style={{fontSize:'0.7em',color:'white',fontWeight:800,fontStyle:'normal',marginTop:6,padding:'4px 10px',background:'#0D9488',borderRadius:6,textTransform:'uppercase'}}>{q.display_label.toUpperCase()}</span>)}</div>
          }
          {getPromptSub&&<p style={getSubStyle||{color:'var(--grey)',marginBottom:8,fontWeight:600,fontSize:'1.2rem'}}>{getPromptSub(q)}</p>}
          <p style={{color:'var(--grey)',marginBottom:40,fontWeight:700,fontSize:'1.3rem',marginTop:getPromptSub?16:0}}>{isLatin?<>Type the <strong style={{color:'var(--navy)',fontSize:'1.4rem'}}>{set.mode==='infinitives'?'infinitive':set.mode==='perfects'?'perfect':set.mode==='ppps'?'PPP':set.mode==='all_four'?'missing part':'answer'}</strong></>:'Type the English translation'}</p>
          <div style={{minHeight:320,display:'flex',flexDirection:'column',alignItems:'center',width:'100%'}}>
            {!fb?<>
              <input ref={inRef} className="typed-input" style={inputStyle} disabled={busy} value={ans} onChange={e=>setAns(e.target.value)} placeholder="..."/>
              <button className="btn btn-primary" disabled={busy} onClick={submit} style={{marginTop:30}}>Check<span className="keyhint" style={{color:'white'}}>Enter</span></button>
            </>:<>
              <input className={`typed-input ${fb.counts_as_correct?'ok':'bad'}`} style={inputStyle} value={ans} disabled/>
              {!retype&&<div className={`feedback anim-fade ${fb.counts_as_correct?(fb.is_typo?'warn':'ok'):'bad'}`} style={{maxWidth:800,width:'100%',boxSizing:'border-box'}}>{renderText(fb.message)}</div>}
              {fb.counts_as_correct&&!retype&&fb.correct_answer&&ans.trim().toLowerCase().replace(/[^a-z0-9 /]/g,'').replace(/\s+/g,' ').trim()!==fb.correct_answer.trim().toLowerCase().replace(/[^a-z0-9 /]/g,'').replace(/\s+/g,' ').trim()&&<div className="anim-fade" style={{marginTop:16,padding:'12px 16px',background:'#f0fdf4',border:'2px solid #16a34a',borderRadius:12,textAlign:'left',maxWidth:800,width:'100%'}}><p style={{fontWeight:700,fontSize:'0.8rem',color:'#16a34a',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>Ideal answer</p><p style={{fontSize:'1.2rem',fontWeight:800,color:'var(--dark)'}}>{fb.correct_answer}</p></div>}
              {retype&&<div className="anim-fade" style={{marginTop:16,width:'100%',maxWidth:800,padding:'24px',background:'var(--white)',border:'2px solid var(--lgrey)',borderRadius:20}}>
                {fb?.message&&<div style={{background:'var(--coral)',color:'white',padding:'10px 18px',borderRadius:10,fontWeight:700,marginBottom:20,display:'inline-block',fontSize:'1rem'}}>{renderText(fb.message)}</div>}
                <div style={{marginBottom:24,padding:'20px',background:'#f0fdf4',border:'2px solid #16a34a',borderRadius:16,textAlign:'left',userSelect:'none',WebkitUserSelect:'none'}}><p style={{fontWeight:800,fontSize:'0.9rem',color:'#16a34a',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>The correct answer is</p><p className={isLatin?'latin':''} style={{fontSize:'1.8rem',fontWeight:800,color:'var(--dark)'}}>{fb?.correct_answer||correct}</p></div>
                
                <input ref={rtRef} className="typed-input" style={{...inputStyle,borderColor:rtFb?'var(--red-bright)':''}} value={rtAns} onChange={e=>{setRtAns(e.target.value);setRtFb(null)}} onPaste={e=>e.preventDefault()} placeholder="..."/>
