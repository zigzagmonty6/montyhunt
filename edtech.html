<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Principal Parts Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'EB Garamond',serif;color:#EAF1F8;overflow:hidden;
    background:radial-gradient(130% 120% at 50% 8%,#114E84 0%,#0C3A66 100%);
    display:flex;align-items:center;justify-content:center;text-align:center;}
  .home{position:fixed;top:26px;left:26px;z-index:20;display:inline-flex;align-items:center;gap:9px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:#EAF1F8;text-decoration:none;padding:10px 16px;border:1.5px solid #D9B25A;
    background:rgba(0,0,0,.2);transition:background .25s,color .25s;}
  .home:hover{background:#D9B25A;color:#0C3A66;}
  .center{position:relative;padding:40px;max-width:680px;}
  .maze{margin:0 auto 30px;display:block;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.36em;text-transform:uppercase;color:#F0D588;margin-bottom:14px;}
  h1{font-family:'Cinzel',serif;font-weight:800;font-size:54px;letter-spacing:.08em;margin:0 0 16px;}
  .rule{width:74px;height:3px;background:#D9B25A;margin:0 auto 26px;}
  .note{font-size:19px;line-height:1.6;color:#A9C6E0;max-width:46ch;margin:0 auto 34px;}
  .launch{display:inline-flex;align-items:center;gap:12px;font-family:'IBM Plex Mono',monospace;
    font-size:14px;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;
    color:#0C3A66;background:#F0D588;padding:16px 30px;border:1.5px solid #D9B25A;
    transition:transform .2s,box-shadow .2s;box-shadow:0 12px 30px -14px rgba(0,0,0,.6);}
  .launch:hover{transform:translateY(-3px);box-shadow:0 20px 40px -16px rgba(0,0,0,.6);}
  .fade{position:fixed;inset:0;z-index:50;background:#114E84;pointer-events:none;animation:rev .7s ease forwards;}
  @keyframes rev{to{opacity:0;}}
</style>
</head>
<body>
  <a class="home" href="index.html">&#8962; Home</a>
  <div class="center">
    <svg class="maze" width="84" height="84" viewBox="0 0 84 84" fill="none" stroke="#D9B25A" stroke-width="3">
      <rect x="6" y="6" width="72" height="72"/>
      <rect x="18" y="18" width="48" height="48"/>
      <rect x="30" y="30" width="24" height="24"/>
      <path d="M42 6 V18 M66 42 H54 M42 78 V66 M18 42 H30" stroke-width="3"/>
    </svg>
    <div class="eyebrow">EdTech</div>
    <h1>Principal Parts Platform</h1>
    <div class="rule"></div>
    <p class="note">A mastery-based Latin platform, live in two London schools. Try the principal parts drill.</p>
    <a class="launch" href="platform-demo.html">&#9654; Launch the platform</a>
  </div>
  <div class="fade"></div>
</body>
</html>
