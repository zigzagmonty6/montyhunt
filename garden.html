<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digital Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'EB Garamond',serif;color:#EEF3E2;overflow:hidden;
    background:radial-gradient(130% 120% at 50% 12%,#2C5E39 0%,#1E4429 100%);
    display:flex;align-items:center;justify-content:center;text-align:center;}
  .home{position:fixed;top:26px;left:26px;z-index:20;display:inline-flex;align-items:center;gap:9px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:#EEF3E2;text-decoration:none;padding:10px 16px;border:1.5px solid #D9B25A;
    background:rgba(0,0,0,.18);transition:background .25s,color .25s;}
  .home:hover{background:#D9B25A;color:#1E4429;}
  .center{position:relative;padding:40px;max-width:520px;}
  .sprout{margin:0 auto 30px;display:block;}
  .stem{transform-box:fill-box;transform-origin:center bottom;animation:grow 5s ease-in-out infinite;}
  @keyframes grow{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.36em;text-transform:uppercase;color:#F0D588;margin-bottom:14px;}
  h1{font-family:'Cinzel',serif;font-weight:800;font-size:54px;letter-spacing:.07em;margin:0 0 18px;}
  .rule{width:74px;height:3px;background:#D9B25A;margin:0 auto 28px;}
  .quote{font-style:italic;font-size:1.25rem;color:#F0D588;line-height:1.6;margin-bottom:8px;}
  .attr{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#C4D6AC;margin-bottom:32px;}
  .soon{font-style:italic;font-size:1.75rem;color:#F0D588;margin-bottom:16px;}
  .note{font-size:1.1rem;line-height:1.6;color:#C4D6AC;max-width:38ch;margin:0 auto;}
  .fade{position:fixed;inset:0;z-index:50;background:#2C5E39;pointer-events:none;animation:rev .7s ease forwards;}
  @keyframes rev{to{opacity:0;}}
</style>
</head>
<body>
  <a class="home" href="index.html">&#8962; Home</a>
  <div class="center">
    <svg class="sprout" width="92" height="104" viewBox="0 0 92 104" fill="none">
      <g class="stem">
        <path d="M46 104 V44" stroke="#D9B25A" stroke-width="3" stroke-linecap="round"/>
        <path d="M46 64 C30 60 22 48 22 36 C38 38 46 50 46 64 Z" fill="#6E9A55"/>
        <path d="M46 56 C62 52 70 40 70 28 C54 30 46 42 46 56 Z" fill="#8FB86B"/>
      </g>
    </svg>
    <div class="eyebrow">Digital Garden</div>
    <h1>Digital Garden</h1>
    <div class="rule"></div>
    <p class="quote">As deep as its roots go, so high does the tree grow.</p>
    <p class="attr">Virgil, Georgics II</p>
    <div class="soon">Coming soon</div>
    <p class="note">Notes, half-formed ideas, things I keep returning to. Tended irregularly.</p>
  </div>
  <div class="fade"></div>
</body>
</html>
