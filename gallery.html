<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;}
  html{background:#422C15;}
  body{font-family:'EB Garamond',serif;color:#F3E9D5;overflow-x:hidden;min-height:100vh;
    background:radial-gradient(130% 120% at 50% 0%,#5E3E1E 0%,#422C15 100%);}
  .home{position:fixed;top:26px;left:26px;z-index:20;display:inline-flex;align-items:center;gap:9px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:#F3E9D5;text-decoration:none;padding:10px 16px;border:1.5px solid #C9A24B;
    background:rgba(0,0,0,.2);transition:background .25s,color .25s;}
  .home:hover{background:#C9A24B;color:#422C15;}
  .wrap{max-width:1180px;margin:0 auto;padding:120px 40px 90px;}
  .head{text-align:center;margin-bottom:48px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.36em;text-transform:uppercase;color:#EAD08A;margin-bottom:14px;}
  h1{font-family:'Cinzel',serif;font-weight:800;font-size:54px;letter-spacing:.07em;margin:0 0 8px;}
  .lede{font-style:italic;font-size:20px;color:#CBB28C;}
  .rule{width:74px;height:3px;background:#C9A24B;margin:18px auto 0;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:20px;margin-bottom:20px;}
  .frame{background:#EFE6CF;padding:10px;box-shadow:0 16px 34px -18px rgba(0,0,0,.6);border:1px solid #d8caa6;}
  .frame img{display:block;width:100%;object-fit:cover;}
  .f-a{grid-column:span 3;} .f-b{grid-column:span 3;}
  .f-c{grid-column:span 2;} .f-d{grid-column:span 2;} .f-e{grid-column:span 2;}
  .f-a img,.f-b img{height:300px;}
  .f-c img,.f-d img,.f-e img{height:220px;}
  @media(max-width:820px){
    .grid{grid-template-columns:1fr 1fr;}
    .f-a,.f-b,.f-c,.f-d,.f-e{grid-column:span 1;}
    .f-a img,.f-b img,.f-c img,.f-d img,.f-e img{height:180px;}
  }
  .fade{position:fixed;inset:0;z-index:50;background:#5E3E1E;pointer-events:none;animation:rev .7s ease forwards;}
  @keyframes rev{to{opacity:0;}}
</style>
</head>
<body>
  <a class="home" href="index.html">&#8962; Home</a>
  <div class="wrap">
    <div class="head">
      <div class="eyebrow">Gallery</div>
      <h1>Interamna Lirenas</h1>
      <div class="lede">Three seasons. One coin hoard.</div>
      <div class="rule"></div>
    </div>
    <div class="grid">
      <div class="frame f-a"><img src="images/gallery-01.jpeg" alt="" /></div>
      <div class="frame f-b"><img src="images/gallery-02.jpeg" alt="" /></div>
      <div class="frame f-c"><img src="images/gallery-03.jpeg" alt="" /></div>
      <div class="frame f-d"><img src="images/gallery-04.jpeg" alt="" /></div>
      <div class="frame f-e"><img src="images/gallery-05.jpeg" alt="" /></div>
    </div>
    <div class="grid">
      <div class="frame f-a"><img src="images/gallery-06.jpeg" alt="" /></div>
      <div class="frame f-b"><img src="images/gallery-07.jpeg" alt="" /></div>
      <div class="frame f-c"><img src="images/gallery-08.jpeg" alt="" /></div>
      <div class="frame f-d"><img src="images/gallery-09.jpeg" alt="" /></div>
      <div class="frame f-e"><img src="images/gallery-10.jpeg" alt="" /></div>
    </div>
    <div class="grid">
      <div class="frame f-c"><img src="images/gallery-11.jpeg" alt="" /></div>
      <div class="frame f-c"><img src="images/gallery-12.jpeg" alt="" /></div>
      <div class="frame f-c"><img src="images/gallery-13.jpeg" alt="" /></div>
      <div class="frame f-c"><img src="images/gallery-14.jpeg" alt="" /></div>
      <div class="frame f-c"><img src="images/gallery-15.jpeg" alt="" /></div>
      <div class="frame f-c"><img src="images/gallery-16.jpeg" alt="" /></div>
    </div>
    <div class="grid">
      <div class="frame f-b"><img src="images/gallery-17.jpeg" alt="" /></div>
      <div class="frame f-b"><img src="images/gallery-18.jpeg" alt="" /></div>
      <div class="frame f-c"><img src="images/gallery-19.jpeg" alt="" /></div>
      <div class="frame f-d"><img src="images/gallery-20.jpeg" alt="" /></div>
      <div class="frame f-e"><img src="images/gallery-21.jpeg" alt="" /></div>
    </div>
    <div class="grid">
      <div class="frame f-a"><img src="images/gallery-22.jpeg" alt="" /></div>
      <div class="frame f-b"><img src="images/gallery-23.jpeg" alt="" /></div>
    </div>
  </div>
  <div class="fade"></div>
</body>
</html>
